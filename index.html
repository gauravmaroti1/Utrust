<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrust — Used Vehicle Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- Firebase SDKs — Firestore only (Spark free plan, no Storage needed) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
           onSnapshot, query, orderBy, serverTimestamp, writeBatch, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDazZSs72-ObVlMWcfCryKh7hwTtUmQ_LA",
    authDomain: "utrust-app.firebaseapp.com",
    projectId: "utrust-app",
    storageBucket: "utrust-app.firebasestorage.app",
    messagingSenderId: "779202883931",
    appId: "1:779202883931:web:5855c6e3023e4c3249aa7e"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);

  // ── Compress a base64 image to ~30 KB JPEG using canvas ──
  // Firestore document limit is 1 MB. With 8 photos per vehicle we target
  // ~80 KB each → total ~640 KB well inside the limit.
  function compressImage(dataUrl, maxW = 800, quality = 0.55) {
    return new Promise(resolve => {
      if (!dataUrl || !dataUrl.startsWith('data:')) { resolve(dataUrl); return; }
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // ── Compress every photo slot in the photos map ──
  async function compressAllPhotos(photos) {
    const out = {};
    for (const [slot, val] of Object.entries(photos || {})) {
      out[slot] = val ? await compressImage(val) : null;
    }
    return out;
  }

  // ── Save new vehicle — photos stored inline in Firestore ──
  async function fbSaveVehicle(vehicle) {
    const { photos, ...rest } = vehicle;
    // Compress photos first
    const compPhotos = await compressAllPhotos(photos || {});
    const docRef = await addDoc(collection(db, 'vehicles'), {
      ...rest,
      photos: compPhotos,
      createdAt: serverTimestamp(),
    });
    // Write back the Firestore-generated id into the doc
    await updateDoc(docRef, { id: docRef.id });
    return docRef.id;
  }

  // ── Update an existing vehicle ──
  async function fbUpdateVehicle(id, updates) {
    const { photos, ...rest } = updates;
    const payload = { ...rest };
    if (photos) {
      payload.photos = await compressAllPhotos(photos);
    }
    await updateDoc(doc(db, 'vehicles', id), payload);
  }

  // ── Delete a vehicle ──
  async function fbDeleteVehicle(id) {
    await deleteDoc(doc(db, 'vehicles', id));
  }

  // ── Real-time listener ──
  function fbListenVehicles(callback) {
    const q = query(collection(db, 'vehicles'), orderBy('createdAt', 'desc'));
    return onSnapshot(q, snap => {
      const docs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      callback(docs);
    }, err => {
      console.error('Firestore error:', err);
    });
  }

  // ── Seed initial sample vehicles if Firestore is empty ──
  async function fbSeedIfEmpty(initialVehicles) {
    const snap = await getDocs(collection(db, 'vehicles'));
    if (snap.empty) {
      for (const v of initialVehicles) {
        await addDoc(collection(db, 'vehicles'), {
          ...v, photos: {}, createdAt: serverTimestamp()
        });
      }
    }
  }

  window.FB = { fbSaveVehicle, fbUpdateVehicle, fbDeleteVehicle, fbListenVehicles, fbSeedIfEmpty };
  window.FB_READY = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0d;--surface:#111318;--surface2:#181c23;--surface3:#1e2330;--border:#252b38;--border2:#2e3545;--accent:#f5a623;--accent2:#e8912a;--accent-dim:rgba(245,166,35,0.12);--accent-dim2:rgba(245,166,35,0.06);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--purple:#a855f7;--text:#e8eaf0;--text2:#9aa3b8;--text3:#5a6480;--radius:8px;--radius2:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
#root{display:flex;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* LOGIN */
.login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(245,166,35,0.08) 0%,transparent 70%);}
.login-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:460px;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.6);}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.login-logo-icon{width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.02em;}
.login-logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px;}
.login-subtitle{color:var(--text2);margin-bottom:28px;font-size:13px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:0.08em;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;transition:border-color 0.15s;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--surface2);}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 20px rgba(245,166,35,0.3);}
.creds-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;}
.creds-title{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.cred-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border);}
.cred-row:last-child{border-bottom:none;}
.cred-key{color:var(--text3);}
.cred-val{font-family:'DM Mono',monospace;color:var(--accent);font-size:11px;}

/* SIDEBAR */
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:36px;height:36px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sidebar-logo-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.sidebar-logo-ver{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.06em;}
.sidebar-user{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.avatar.admin{background:rgba(168,85,247,0.2);color:var(--purple);border:1px solid rgba(168,85,247,0.3);}
.avatar.leader{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.avatar.officer{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.sidebar-user-name{font-size:12px;font-weight:600;line-height:1.2;}
.sidebar-user-role{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.sidebar-user-branch{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;}
.sidebar-section{padding:10px 14px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all 0.15s;font-size:13px;color:var(--text2);font-weight:500;position:relative;margin:1px 8px;border-radius:var(--radius);}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace;}
.nav-badge.accent{background:var(--accent);color:#000;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text3);font-family:'Instrument Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10;}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--text3);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{background:var(--accent2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.btn-success:hover{background:rgba(34,197,94,0.2);}
.btn-sm{padding:5px 10px;font-size:12px;}
.content{flex:1;padding:24px;overflow-y:auto;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.2s;}
.stat-card:hover::after{transform:scaleX(1);}
.stat-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px;}
.stat-change{font-size:11px;color:var(--green);}
.stat-icon{position:absolute;top:16px;right:16px;font-size:22px;opacity:0.25;}

/* TABLE */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
.badge-pending{background:rgba(245,166,35,0.15);color:var(--accent);border:1px solid rgba(245,166,35,0.25);}
.badge-approved{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.badge-rejected{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.badge-draft{background:var(--surface3);color:var(--text3);border:1px solid var(--border2);}
.badge-review{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.25);}

/* FORM */
.form-container{max-width:880px;}
.step-progress{display:flex;margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.step{flex:1;padding:11px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase;font-family:'DM Mono',monospace;border-right:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.step:last-child{border-right:none;}
.step.active{background:var(--accent-dim);color:var(--accent);}
.step.done{color:var(--green);background:var(--green-dim);}
.step-num{display:block;font-size:16px;font-family:'Syne',sans-serif;font-weight:800;margin-bottom:1px;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:16px;}
.form-card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.form-card-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.three{grid-template-columns:1fr 1fr 1fr;}
.form-grid.full{grid-template-columns:1fr;}
.span2{grid-column:span 2;}
.span3{grid-column:span 3;}
.combo-input{display:flex;gap:0;}
.combo-input select{border-radius:var(--radius) 0 0 var(--radius);border-right:none;flex:1;}
.combo-input input{border-radius:0 var(--radius) var(--radius) 0;flex:1;background:var(--surface2);border:1px solid var(--border);border-left:none;padding:10px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;outline:none;}
.combo-input input:focus{border-color:var(--accent);}

/* CAMERA */
.camera-container{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius2);overflow:hidden;}
.camera-preview{width:100%;aspect-ratio:4/3;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
.camera-preview video{width:100%;height:100%;object-fit:cover;}
.camera-preview canvas{width:100%;height:100%;object-fit:cover;}
.camera-controls{padding:12px;display:flex;gap:8px;justify-content:center;border-top:1px solid var(--border);}
.camera-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.camera-slot{background:var(--surface2);border:2px dashed var(--border2);border-radius:var(--radius2);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.camera-slot:hover{border-color:var(--accent);}
.camera-slot.captured{border-style:solid;border-color:var(--green);}
.camera-slot-preview{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;background:#000;}
.camera-slot-preview img{width:100%;height:100%;object-fit:cover;}
.camera-slot-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;}
.camera-slot-label{font-size:11px;text-align:center;padding:8px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface2);letter-spacing:0.04em;}
.camera-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.camera-modal-video{width:100%;max-width:500px;border-radius:var(--radius2);overflow:hidden;background:#000;}
.camera-modal-video video{width:100%;display:block;}
.camera-modal-actions{display:flex;gap:14px;margin-top:16px;}
.shutter-btn{width:68px;height:68px;border-radius:50%;background:var(--accent);border:4px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all 0.15s;}
.shutter-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(245,166,35,0.5);}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius2);padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface2);}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-dim2);}
.upload-zone.uploaded{border-style:solid;border-color:var(--green);background:var(--green-dim);}
.upload-icon{font-size:24px;margin-bottom:8px;display:block;}
.upload-label{font-size:12px;font-weight:600;color:var(--text2);}
.upload-sub{font-size:10px;color:var(--text3);margin-top:3px;}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:8px;}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);}
.check-label{font-size:13px;font-weight:500;}
.check-controls{display:flex;gap:5px;}
.check-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.15s;color:var(--text3);}
.check-btn.good{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.check-btn.bad{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.check-btn.warn{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

/* RATING */
.rating{display:flex;gap:5px;}
.rating-btn{width:34px;height:34px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.rating-btn:hover{border-color:var(--accent);color:var(--accent);}
.rating-btn.selected{background:var(--accent);border-color:var(--accent);color:#000;}

/* PRICE ALGO */
.algo-box{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px;margin-bottom:16px;}
.algo-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.algo-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.algo-breakdown{display:flex;flex-direction:column;gap:6px;}
.algo-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);}
.algo-row:last-child{border-bottom:none;font-weight:700;font-size:14px;}
.algo-key{color:var(--text3);}
.algo-val{font-family:'DM Mono',monospace;color:var(--text);}
.algo-val.minus{color:var(--red);}
.algo-val.result{color:var(--accent);font-size:16px;}
.algo-suggest{font-size:11px;color:var(--text3);margin-top:10px;padding:10px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid var(--accent);}

/* MODAL */

// ═══════════════════════════════════════════════════════
//  PRICE ESTIMATION ALGORITHM
// ═══════════════════════════════════════════════════════
function estimatePrice(idv, year, accidental, claimHistory, odometer, engine, fuel){
  if(!idv||!year) return null;
  const currentYear=new Date().getFullYear();
  const age=currentYear-parseInt(year);
  let price=parseFloat(idv);
  const steps=[];

  steps.push({label:'Base IDV',val:price,type:'base'});

  // Depreciation by age (RTO guidelines + market correction)
  const depRates=[0,0.05,0.10,0.15,0.20,0.25,0.30,0.38,0.46,0.52,0.58,0.63,0.67,0.70,0.73,0.76,0.78,0.80,0.82,0.84,0.86];
  const dep=depRates[Math.min(age,20)]||0.86;
  const depAmt=price*dep;
  price-=depAmt;
  steps.push({label:`Age depreciation (${age}yr, ${Math.round(dep*100)}%)`,val:-depAmt,type:'deduct'});

  // Odometer correction
  if(odometer){
    const odo=parseInt(odometer);
    const avgAnnual=12000;
    const expectedKm=age*avgAnnual;
    const diff=odo-expectedKm;
    if(diff>0){
      const penalty=Math.min(diff*0.8,price*0.08);
      price-=penalty;
      steps.push({label:`High odometer penalty (+${Math.round(diff/1000)}K km)`,val:-penalty,type:'deduct'});
    } else if(diff<-5000){
      const bonus=Math.min(Math.abs(diff)*0.3,price*0.04);
      price+=bonus;
      steps.push({label:`Low odometer bonus`,val:bonus,type:'bonus'});
    }
  }

  // Accidental history
  if(accidental==='Yes'){
    const pen=price*0.12;
    price-=pen;
    steps.push({label:'Accidental vehicle penalty (12%)',val:-pen,type:'deduct'});
  }

  // Claim history
  const claimMap={'None':0,'1 Minor':0.04,'1 Major':0.10,'2+ Claims':0.15,'Unknown':0.06};
  const claimPct=claimMap[claimHistory]||0;
  if(claimPct>0){
    const pen=price*claimPct;
    price-=pen;
    steps.push({label:`Claim history deduction (${claimHistory})`,val:-pen,type:'deduct'});
  }

  // Engine condition
  const engMap={'Excellent':0.03,'Good':0,'Fair':-0.05,'Poor':-0.12};
  const engAdj=engMap[engine]||0;
  if(engAdj!==0){
    const adj=price*engAdj;
    price+=adj;
    steps.push({label:`Engine condition (${engine})`,val:adj,type:engAdj>0?'bonus':'deduct'});
  }

  // Fuel type premium/discount
  const fuelAdj={'Diesel':0.03,'Electric':0.05,'Hybrid':0.04,'CNG':-0.02,'Petrol':0,'LPG':-0.03};
  const fAdj=fuelAdj[fuel]||0;
  if(fAdj!==0){
    const adj=price*fAdj;
    price+=adj;
    steps.push({label:`Fuel type factor (${fuel})`,val:adj,type:fAdj>0?'bonus':'deduct'});
  }

  // Dealer margin (buy at 8% below estimated)
  const margin=price*0.08;
  price-=margin;
  steps.push({label:'Dealer purchase margin (8%)',val:-margin,type:'deduct'});

  price=Math.max(price,10000);
  steps.push({label:'Recommended Purchase Price',val:price,type:'result'});

  return {price:Math.round(price),steps};
}

// ═══════════════════════════════════════════════════════
function CameraCapture({label,onCapture,captured}){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const [open,setOpen]=useState(false);
  const [stream,setStream]=useState(null);
  const [err,setErr]=useState('');
  const [facingMode,setFacingMode]=useState('environment');

  async function startCamera(){
    setErr('');
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1080}}});
      setStream(s);
      if(videoRef.current)videoRef.current.srcObject=s;
      setOpen(true);
    }catch(e){
      setErr('Camera access denied. Please allow camera permission and try again.');
    }
  }
  function stopCamera(){
    if(stream)stream.getTracks().forEach(t=>t.stop());
    setStream(null);setOpen(false);
  }
  function capture(){
    const v=videoRef.current,c=canvasRef.current;
    if(!v||!c)return;
    c.width=v.videoWidth;c.height=v.videoHeight;
    const ctx=c.getContext('2d');
    ctx.drawImage(v,0,0);
    // Add timestamp
    const now=new Date();
    const ts=now.toLocaleString('en-IN');
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(0,c.height-36,c.width,36);
    ctx.fillStyle='#f5a623';
    ctx.font='bold 16px monospace';
    ctx.fillText('📍 '+ts+' | Utrust',10,c.height-12);
    const dataUrl=c.toDataURL('image/jpeg',0.92);
    onCapture(dataUrl);
    stopCamera();
  }
  async function switchCamera(){
    if(stream)stream.getTracks().forEach(t=>t.stop());
    const next=facingMode==='environment'?'user':'environment';
    setFacingMode(next);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:next}});
      setStream(s);
      if(videoRef.current)videoRef.current.srcObject=s;
    }catch(e){}
  }

  return<>
    <div className={`camera-slot ${captured?'captured':''}`} onClick={()=>!captured&&startCamera()}>
      <div className="camera-slot-preview">
        {captured
          ?<img src={captured} alt={label}/>
          :<div className="camera-slot-placeholder">
            <span style={{fontSize:28,marginBottom:6}}>📷</span>
            <span style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>{err||'Tap to capture'}</span>
          </div>
        }
      </div>
      <div className="camera-slot-label">{label}{captured&&' ✓'}</div>
    </div>
    {captured&&<button className="btn btn-danger btn-sm" style={{marginTop:4,width:'100%'}} onClick={e=>{e.stopPropagation();onCapture(null);}}>Retake</button>}

    {open&&<div className="camera-modal">
      <div style={{color:'#fff',fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,marginBottom:12}}>{label}</div>
      <div className="camera-modal-video">
        <video ref={videoRef} autoPlay playsInline muted style={{width:'100%',display:'block'}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
      </div>
      <div className="camera-modal-actions">

function Login({onLogin}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState('');
  const [showCreds,setShowCreds]=useState(false);

  function login(){
    const u=CREDENTIALS.find(c=>c.username===username.trim()&&c.password===password);
    if(u){onLogin(u);setErr('');}
    else setErr('Invalid username or password. Check credentials below.');
  }

  return<div className="login-screen">
    <div className="login-bg"/><div className="login-grid"/>
    <div className="login-card">
      <div className="login-logo">
        <div className="login-logo-icon">🚗</div>

      </div>
      <div className="login-title">Sign In</div>
      <div className="login-subtitle">Enter your assigned credentials to continue</div>
      <div className="field"><label>Username</label><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="e.g. admin or eval.purnea1" autoComplete="username"/></div>
      <div className="field"><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&login()} autoComplete="current-password"/></div>
      {err&&<div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--red)',marginBottom:14}}>⚠ {err}</div>}
      <button className="btn-primary" onClick={login}>Sign In →</button>

      <div style={{textAlign:'center',marginTop:18}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowCreds(v=>!v)} style={{fontSize:11}}>
          {showCreds?'Hide':'Show'} Demo Credentials

      {showCreds&&<div className="creds-box" style={{marginTop:14}}>

          <span className="cred-val">{c.username} / {c.password}</span>
        </div>)}
      </div>}
    </div>
  </div>;
}

function Dashboard({vehicles,user,setPage}){
  const mine=user.role==='officer'?vehicles.filter(v=>v.officerId===user.id):vehicles;
  const total=mine.length;
  const approved=mine.filter(v=>v.status==='approved').length;
  const pending=mine.filter(v=>v.status==='pending'||v.status==='review').length;
  const avgPrice=mine.filter(v=>v.price).reduce((a,b)=>a+b.price,0)/(mine.filter(v=>v.price).length||1);
  const recent=[...mine].sort((a,b)=>(b.submitted||'').localeCompare(a.submitted||'')).slice(0,5);

  return<div>
    <div className="stats-grid">
      {[
        {label:'Total Inspections',value:total,icon:'🚗',sub:'vehicles recorded'},
        {label:'Approved',value:approved,icon:'✅',sub:`${total?Math.round(approved/total*100):0}% approval rate`},
        {label:'Pending Review',value:pending,icon:'⏳',sub:'awaiting decision'},

        <div className="stat-value">{s.value}</div>

    {user.role!=='officer'&&<div className="analytics-grid" style={{marginBottom:24}}>

        <div className="chart-title">Branch Performance</div>
        <div className="bar-chart">
          {['Purnea','Bhagalpur','Forbesganj'].map(b=>{
            const cnt=vehicles.filter(v=>v.branch===b).length;
            const max=Math.max(...['Purnea','Bhagalpur','Forbesganj'].map(x=>vehicles.filter(v=>v.branch===x).length))||1;
            return<div key={b} className="bar-row">
              <div className="bar-label" style={{fontSize:11}}>{b}</div>

function VehiclesList({vehicles,user,setPage,setSelectedVehicle,onAddNew,onDelete}){
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [branch,setBranch]=useState('all');
  const myVehicles=user.role==='officer'?vehicles.filter(v=>v.officerId===user.id):vehicles;
  const filtered=myVehicles.filter(v=>{
    const q=search.toLowerCase();
    const m=!q||(v.reg||'').toLowerCase().includes(q)||(v.brand||'').toLowerCase().includes(q)||(v.model||'').toLowerCase().includes(q)||(v.officer||'').toLowerCase().includes(q);
    const sm=filter==='all'||v.status===filter;
    const bm=branch==='all'||v.branch===branch;
    return m&&sm&&bm;
  });

  return<div>
    <div style={{display:'flex',gap:10,marginBottom:18,alignItems:'center',flexWrap:'wrap'}}>
      <div className="search-bar">
        <span>🔍</span>
        <input placeholder="Search reg, brand, model..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      {user.role!=='officer'&&<select style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'7px 12px',color:'var(--text)',fontSize:13,outline:'none'}} value={branch} onChange={e=>setBranch(e.target.value)}>

        <option>Purnea</option><option>Bhagalpur</option><option>Forbesganj</option>
      </select>}
      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
        {['all','approved','pending','review','rejected','draft'].map(f=><button key={f} className={`btn btn-sm ${filter===f?'btn-accent':'btn-ghost'}`} onClick={()=>setFilter(f)} style={{textTransform:'uppercase',fontSize:10,letterSpacing:'0.04em'}}>{f}</button>)}
      </div>
      {(user.role==='officer'||user.role==='admin')&&<button className="btn btn-accent btn-sm" style={{marginLeft:'auto'}} onClick={onAddNew}>➕ New Inspection</button>}
    </div>

    <div className="table-container">
      <div className="table-header">
        <div className="table-title">Vehicle Records <span style={{color:'var(--text3)',fontWeight:400,fontSize:11,fontFamily:'DM Mono,monospace'}}>({filtered.length})</span></div>
      </div>
      <table>
        <thead><tr><th>Reg No.</th><th>Vehicle</th><th>Year</th><th>Odo (km)</th><th>Branch</th><th>Evaluator</th><th>Est. Price</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9}><div style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>No vehicles found</div></td></tr>}
          {filtered.map(v=><tr key={v.id}>
            <td><span style={{fontFamily:'monospace',color:'var(--accent)',fontSize:12,fontWeight:600}}>{v.reg}</span></td>
            <td><b>{v.brand} {v.model}</b><br/><span style={{color:'var(--text3)',fontSize:10}}>{v.variant}</span></td>
            <td style={{color:'var(--text2)'}}>{v.year}</td>
            <td style={{fontFamily:'monospace',fontSize:12}}>{v.odometer?.toLocaleString('en-IN')}</td>
            <td><span style={{fontSize:11,color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{v.branch}</span></td>
            <td style={{color:'var(--text2)',fontSize:11}}>{v.officer}</td>
            <td style={{fontFamily:'monospace',fontWeight:700,color:v.status==='approved'?'var(--green)':'var(--text)'}}>{fmtL(v.price)}</td>
            <td><StatusBadge status={v.status}/></td>
            <td>
              <div style={{display:'flex',gap:5}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setSelectedVehicle(v);setPage('detail');}}>View</button>
                {user.role==='admin'&&<button className="btn btn-danger btn-sm" onClick={()=>onDelete(v.id)}>Del</button>}
              </div>
            </td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

      <div className="form-card-title">📷 Vehicle Inspection Photos</div>
      <div className="form-card-sub">Capture all angles using device camera — {photoCaptured}/8 photos done (2 interior required)</div>
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:18,fontSize:12,color:'var(--text2)',display:'flex',alignItems:'center',gap:8}}>
        <span>📱</span> Uses your device camera. Timestamp is auto-embedded on every photo.
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Exterior Photos</div>
      <div className="camera-grid" style={{marginBottom:18}}>
        {[['front','Front View *'],['rear','Rear View *'],['left','Left Side *'],['right','Right Side *']].map(([k,l])=>
          <CameraCapture key={k} label={l} onCapture={v=>setPhoto(k,v)} captured={data.photos[k]}/>
        )}
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Interior Photos (Minimum 2 required)</div>
      <div className="camera-grid" style={{marginBottom:18}}>
        <CameraCapture label="Interior — Dashboard & Front *" onCapture={v=>setPhoto('interior1',v)} captured={data.photos.interior1}/>
        <CameraCapture label="Interior — Rear Seats & Boot *" onCapture={v=>setPhoto('interior2',v)} captured={data.photos.interior2}/>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Under Hood & Chassis</div>
      <div className="camera-grid">
        <CameraCapture label="Engine Bay *" onCapture={v=>setPhoto('engine',v)} captured={data.photos.engine}/>
        <CameraCapture label="Chassis / VIN Number *" onCapture={v=>setPhoto('chassis',v)} captured={data.photos.chassis}/>
      </div>
      <div style={{marginTop:18}}>
        <div className="field"><label>Inspection Remarks</label>
          <textarea rows={3} value={data.remarks} onChange={e=>set('remarks',e.target.value)} placeholder="Note scratches, dents, damages, body condition..." style={{resize:'vertical'}}/>
        </div>
      </div>
    </div>,

    // 3: Documents
    <div className="form-card">
      <div className="form-card-title">📋 Document Upload</div>
      <div className="form-card-sub">Capture or upload required documents. RC and Insurance are mandatory.</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
        {[['rc','📄','RC (Registration Certificate) *'],['insurance','🛡','Insurance Document *'],['pollution','🌿','Pollution Certificate (PUC)']].map(([k,icon,label])=>
          <div key={k}>
            <div className={`upload-zone ${data.docs[k]?'uploaded':''}`} onClick={()=>setDoc(k,true)}>
              <span className="upload-icon">{data.docs[k]?'✅':icon}</span>
              <div className="upload-label">{data.docs[k]?'Uploaded ✓':'Tap to Upload'}</div>
              <div className="upload-sub">{label}</div>
            </div>
            {data.docs[k]&&<button className="btn btn-danger btn-sm" style={{marginTop:4,width:'100%'}} onClick={e=>{e.stopPropagation();setDoc(k,false);}}>Remove</button>}
          </div>
        )}
      </div>
      <div style={{marginTop:14}}>
        <div className="upload-zone" onClick={()=>{}}>
          <span className="upload-icon">📎</span>
          <div className="upload-label">Additional Documents</div>
          <div className="upload-sub">Service history, warranty, NOC etc.</div>
        </div>
      </div>
    </div>,

    // 4: Insurance
    <div className="form-card">
      <div className="form-card-title">🛡 Insurance & IDV Details</div>
      <div className="form-card-sub">Enter OD and Third Party validity separately — IDV drives price algorithm</div>
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:16,fontSize:12,color:'var(--text2)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'0.08em',textTransform:'uppercase'}}>Insurance Validity</div>
        <div className="form-grid">
          <div className="field" style={{marginBottom:0}}>
            <label>OD (Own Damage) Valid Until *</label>
            <input type="date" value={data.insurance_valid_od} onChange={e=>set('insurance_valid_od',e.target.value)}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Covers damage to your own vehicle</div>
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>Third Party (TP) Valid Until *</label>
            <input type="date" value={data.insurance_valid_tp} onChange={e=>set('insurance_valid_tp',e.target.value)}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Mandatory by law — covers third party</div>
          </div>
        </div>
        {data.insurance_valid_od&&data.insurance_valid_tp&&<div style={{marginTop:10,padding:'8px 10px',background:'var(--surface3)',borderRadius:'var(--radius)',fontSize:11,color:'var(--text3)'}}>
          {new Date(data.insurance_valid_od)<new Date(data.insurance_valid_tp)
            ?`⚠ OD expires before TP — OD valid until ${data.insurance_valid_od}`
            :`✓ Both policies active — TP valid until ${data.insurance_valid_tp}`}
        </div>}
      </div>
      <div className="form-grid">
        <div className="field"><label>IDV — Insured Declared Value (₹) *</label><input type="number" value={data.idv} onChange={e=>set('idv',e.target.value)} placeholder="e.g. 750000"/></div>
        <div className="field"><label>Claim History</label>
          <select value={data.claim_history} onChange={e=>set('claim_history',e.target.value)}>
            {['None','1 Minor','1 Major','2+ Claims','Unknown'].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>
    </div>,

    // 5: Assessment
    <div className="form-card">
      <div className="form-card-title">🔍 Condition Assessment</div>
      <div className="form-card-sub">Rate every component — affects price estimation algorithm</div>
      <div className="checklist" style={{marginBottom:20}}>
        {[
          {label:'Engine Condition',field:'engine',opts:['Excellent','Good','Fair','Poor']},
          {label:'Tyres Condition',field:'tyres',opts:['Excellent','Good','Fair','Worn']},
          {label:'Battery Status',field:'battery',opts:['Excellent','Good','Weak','Dead']},
          {label:'Electricals',field:'electricals',opts:['Excellent','Good','Issues','Dead']},
        ].map(c=><div key={c.field} className="check-item">
          <span className="check-label">{c.label}</span>
          <div className="check-controls">
            {c.opts.map(o=><button key={o} className={`check-btn ${data[c.field]===o?(o==='Excellent'||o==='Good'?'good':o==='Fair'||o==='Weak'?'warn':'bad'):''}`} onClick={()=>set(c.field,o)}>{o}</button>)}
          </div>
        </div>)}
        {[{label:'Accidental History',field:'accidental'},{label:'Flood Damage',field:'flood'}].map(c=><div key={c.field} className="check-item">
          <span className="check-label">{c.label}</span>
          <div className="check-controls">
            <button className={`check-btn ${data[c.field]==='Yes'?'bad':''}`} onClick={()=>set(c.field,'Yes')}>Yes</button>
            <button className={`check-btn ${data[c.field]==='No'?'good':''}`} onClick={()=>set(c.field,'No')}>No</button>
            <button className={`check-btn ${data[c.field]==='Unknown'?'warn':''}`} onClick={()=>set(c.field,'Unknown')}>Unknown</button>
          </div>
        </div>)}
      </div>
      <div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Overall Vehicle Rating (1–10)</div>
        <div className="rating">
          {Array.from({length:10},(_,i)=>i+1).map(n=><button key={n} className={`rating-btn ${data.rating===n?'selected':''}`} onClick={()=>set('rating',n)}>{n}</button>)}
        </div>
      </div>
    </div>,

    // 6: Pricing (officer = estimate only, cannot finalize)
    <div className="form-card">
      <div className="form-card-title">💰 Price Estimation</div>
      <div className="form-card-sub">Enter your estimated purchase price — Team Leader will approve/revise</div>

      {algo&&<div className="algo-box">
        <div className="algo-title">🧮 Algorithm Suggested Price</div>
        <div className="algo-sub">Based on IDV, vehicle age, condition, claim history & fuel type</div>
        <div className="algo-breakdown">
          {algo.steps.map((s,i)=><div key={i} className="algo-row">
            <span className="algo-key">{s.label}</span>
            <span className={`algo-val ${s.type==='result'?'result':s.type==='deduct'?'minus':''}`}>
              {s.type==='base'?fmt(s.val):s.type==='result'?fmtL(s.val):`${s.val>=0?'+':''}${fmt(s.val)}`}
            </span>
          </div>)}
        </div>
        <div className="algo-suggest">
          💡 Suggested Purchase Price: <b style={{color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{fmtL(algo.price)}</b>
          &nbsp;— You may quote within ±10% of this. Final approval by Utrust Incharge.
        </div>
      </div>}

      {!algo&&<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:16,marginBottom:16,color:'var(--text3)',fontSize:12}}>
        ⚠ Fill IDV, Year, and Assessment fields to see algorithm-suggested price
      </div>}

      <div className="field">
        <label>Your Estimated Purchase Price (₹) *</label>
        <input type="number" value={data.price} onChange={e=>set('price',e.target.value)} placeholder={algo?`Suggested: ${algo.price}`:'e.g. 750000'} style={{fontFamily:'monospace',fontSize:20,padding:'14px'}}/>
        {data.price&&<div style={{marginTop:6,display:'flex',gap:16,fontSize:12}}>
          <span style={{color:'var(--green)'}}>= {fmtL(data.price)}</span>
          {algo&&<span style={{color:Math.abs(data.price-algo.price)/algo.price>0.15?'var(--red)':'var(--text3)'}}>
            {Math.abs(data.price-algo.price)/algo.price>0.15?'⚠ Significantly differs from algorithm':'✓ Within acceptable range'}
          </span>}
        </div>}
      </div>
      <div style={{background:'var(--accent-dim)',border:'1px solid rgba(245,166,35,0.2)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--accent)',marginTop:4}}>
        🔒 This is your <b>estimated</b> price only. The Utrust Incharge will review and set the final approved purchase price.
      </div>
    </div>,

    // 7: Submit
    <div className="form-card">
      <div className="form-card-title">✅ Review & Submit</div>
      <div className="form-card-sub">Verify details before sending for Incharge approval</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
        {[
          ['Registration',data.reg||'—'],
          ['Vehicle',`${data.brand==='Other'?manualBrand:data.brand} ${data.model==='-- Type Manually --'?manualModel:data.model}`.trim()||'—'],
          ['Variant',data.variant==='-- Type Manually --'?manualVariant:(data.variant||'—')],
          ['Year',data.year==='-- Enter Manually --'?manualYear:(data.year||'—')],
          ['Fuel',data.fuel||'—'],
          ['Transmission',data.transmission==='-- Enter Manually --'?manualTransmission:(data.transmission||'—')],
          ['Odometer',data.odometer?`${parseInt(data.odometer).toLocaleString('en-IN')} km`:'—'],
          ['OD Insurance',data.insurance_valid_od||'—'],
          ['TP Insurance',data.insurance_valid_tp||'—'],
          ['IDV',fmtL(data.idv)],['Estimated Price',fmtL(data.price)],
          ['Engine',data.engine||'—'],['Accidental',data.accidental||'—'],
          ['Photos',`${photoCaptured}/8 captured`],['Branch',user.branch],
        ].map(([k,v])=><div key={k} style={{padding:'9px 12px',background:'var(--surface2)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
          <div style={{fontSize:9,color:'var(--text3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.07em',textTransform:'uppercase'}}>{k}</div>
          <div style={{fontSize:13,fontWeight:600,marginTop:2,color:k==='Photos'&&photoCaptured<8?'var(--red)':'var(--text)'}}>{v}</div>
        </div>)}
      </div>
      {photoCaptured<8&&<div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--red)',marginBottom:14}}>
        ⚠ Only {photoCaptured}/8 photos captured. All photos are mandatory before submission. (2 interior photos required)
      </div>}
      <div style={{background:'var(--accent-dim)',border:'1px solid rgba(245,166,35,0.25)',borderRadius:'var(--radius)',padding:12,fontSize:12,color:'var(--accent)'}}>
        🚀 Submitting will send this inspection to <b>Utrust Incharge</b> for review and price approval.
      </div>
    </div>,
  ];

  return<div className="form-container">
    <div className="step-progress">
      {steps.map((s,i)=><div key={i} className={`step ${i===step?'active':i<step?'done':''}`} onClick={()=>i<step&&setStep(i)}>
        <span className="step-num">{i<step?'✓':i+1}</span>{s}
      </div>)}
    </div>
    {stepContent[step]}
    <div style={{display:'flex',gap:10,justifyContent:'space-between',marginTop:8}}>
      <button className="btn btn-ghost" onClick={step===0?onCancel:()=>setStep(s=>s-1)}>{step===0?'Cancel':'← Back'}</button>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost" onClick={()=>handleSubmit(true)}>💾 Save Draft</button>
        {step<steps.length-1
          ?<button className="btn btn-accent" onClick={()=>setStep(s=>s+1)}>Next →</button>
          :<button className="btn btn-accent" onClick={()=>handleSubmit(false)}>🚀 Submit for Approval</button>
        }
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════
//  VEHICLE DETAIL
// ═══════════════════════════════════════════════════════
function VehicleDetail({vehicle,user,onBack,onApprove,onReject,onGeneratePDF,onUpdatePrice}){
  const [comment,setComment]=useState('');
  const [approvedPrice,setApprovedPrice]=useState('');
  const [modal,setModal]=useState(null);
  if(!vehicle)return<div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>No vehicle selected</div>;

  const algo=estimatePrice(vehicle.idv,vehicle.year,vehicle.accidental,vehicle.claim_history,vehicle.odometer,vehicle.engine,vehicle.fuel);
  const photoKeys=['front','rear','left','right','interior1','interior2','engine','chassis'];
  const photoLabels={front:'FRONT',rear:'REAR',left:'LEFT',right:'RIGHT',interior1:'INTERIOR 1',interior2:'INTERIOR 2',engine:'ENGINE',chassis:'CHASSIS'};

  return<div>
    <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:22,flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
      <div style={{flex:1}}>
        <div style={{fontFamily:'DM Mono,monospace',color:'var(--accent)',fontSize:12,fontWeight:600}}>{vehicle.reg} · {vehicle.branch}</div>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:19,fontWeight:800}}>{vehicle.brand} {vehicle.model} {vehicle.variant}</div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <StatusBadge status={vehicle.status}/>
        {(user.role==='leader'||user.role==='admin')&&vehicle.status==='pending'&&<>
          <button className="btn btn-success btn-sm" onClick={()=>setModal('approve')}>✓ Approve</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setModal('reject')}>✗ Reject</button>
        </>}
        <button className="btn btn-accent btn-sm" onClick={()=>onGeneratePDF(vehicle)}>📄 PDF</button>
      </div>
    </div>

    <div className="detail-sections">
      <div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🚗 Vehicle Details</div>
          {[['Registration',vehicle.reg],['Brand',vehicle.brand],['Model',vehicle.model],['Variant',vehicle.variant],['Year',vehicle.year],['Fuel',vehicle.fuel],['Transmission',vehicle.transmission],['Odometer',vehicle.odometer?`${vehicle.odometer.toLocaleString('en-IN')} km`:'—'],['Ownership',vehicle.ownership],['Branch',vehicle.branch],['Evaluator',vehicle.officer]].map(([k,v])=>
            <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v||'—'}</span></div>
          )}
        </div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🛡 Insurance & IDV</div>
          {[['IDV',fmtL(vehicle.idv)],['OD Valid Until',vehicle.insurance_valid_od||vehicle.insurance_valid||'—'],['TP Valid Until',vehicle.insurance_valid_tp||'—'],['Claim History',vehicle.claim_history]].map(([k,v])=>
            <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v||'—'}</span></div>
          )}
        </div>
        <div className="detail-card">
          <div className="detail-card-title">💰 Price Details</div>
          <div style={{padding:'12px 0',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:4}}>EVALUATOR ESTIMATE</div>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:800,color:'var(--accent)'}}>{fmtL(vehicle.price)}</div>
            {algo&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Algorithm suggests: <b style={{color:'var(--text2)'}}>{fmtL(algo.price)}</b></div>}
            {vehicle.approved_price&&<>
              <div style={{height:1,background:'var(--border)',margin:'12px 0'}}/>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:4}}>INCHARGE APPROVED PRICE</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:800,color:'var(--green)'}}>{fmtL(vehicle.approved_price)}</div>
            </>}
          </div>
          {(user.role==='leader'||user.role==='admin')&&vehicle.status==='approved'&&<div style={{marginTop:8}}>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:5,fontFamily:'DM Mono,monospace',letterSpacing:'0.06em',textTransform:'uppercase'}}>Update Approved Price</div>
            <div style={{display:'flex',gap:6}}>
              <input type="number" placeholder="Final price..." style={{flex:1,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'7px 12px',color:'var(--text)',fontFamily:'monospace',fontSize:13,outline:'none'}} onChange={e=>setApprovedPrice(e.target.value)}/>
              <button className="btn btn-success btn-sm" onClick={()=>{onUpdatePrice(vehicle.id,parseInt(approvedPrice));}}>Set</button>
            </div>
          </div>}
        </div>
      </div>

      <div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">📷 Photos</div>
          <div className="photo-grid">
            {photoKeys.map(k=><div key={k}>
              <div className="photo-thumb">
                {vehicle.photos&&vehicle.photos[k]?<img src={vehicle.photos[k]} alt={k}/>:<span style={{fontSize:18}}>📷</span>}
              </div>
              <div className="photo-label">{photoLabels[k]||k.toUpperCase()}</div>
            </div>)}
          </div>
        </div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🔍 Condition</div>
          {[['Engine',vehicle.engine],['Tyres',vehicle.tyres],['Battery',vehicle.battery],['Electricals',vehicle.electricals],['Accidental',vehicle.accidental],['Flood',vehicle.flood],['Rating',`${vehicle.rating}/10`]].map(([k,v])=>{
            const bad=v==='Worn'||v==='Dead'||v==='Issues'||v==='Yes'||v==='Poor';
            const good=v==='Excellent'||v==='Good'||v==='No';
            return<div key={k} className="detail-row">
              <span className="detail-key">{k}</span>
              <span className="detail-val" style={{color:bad?'var(--red)':good?'var(--green)':'var(--accent)'}}>{v||'—'}</span>
            </div>;
          })}
        </div>
        {algo&&<div className="detail-card">
          <div className="detail-card-title">🧮 Price Algorithm Breakdown</div>
          {algo.steps.map((s,i)=><div key={i} className="detail-row">
            <span className="detail-key" style={{fontSize:10}}>{s.label}</span>
            <span className="detail-val" style={{fontSize:11,color:s.type==='result'?'var(--accent)':s.type==='deduct'?'var(--red)':s.type==='bonus'?'var(--green)':'var(--text)'}}>{s.type==='base'?fmt(s.val):s.type==='result'?fmtL(s.val):`${s.val>=0?'+':''}${fmt(s.val)}`}</span>
          </div>)}
        </div>}
      </div>
    </div>

    {modal&&<Modal title={modal==='approve'?'Approve & Set Price':'Reject Vehicle'} sub={`${vehicle.brand} ${vehicle.model} — ${vehicle.reg}`} onClose={()=>setModal(null)}>
      {modal==='approve'&&<>
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:12,marginBottom:14,fontSize:12}}>
          <div style={{color:'var(--text3)',marginBottom:4}}>Evaluator estimate: <b style={{color:'var(--accent)'}}>{fmtL(vehicle.price)}</b></div>
          {algo&&<div style={{color:'var(--text3)'}}>Algorithm suggests: <b style={{color:'var(--text2)'}}>{fmtL(algo.price)}</b></div>}
        </div>
        <div className="field"><label>Final Approved Purchase Price (₹) *</label>
          <input type="number" value={approvedPrice} onChange={e=>setApprovedPrice(e.target.value)} placeholder={`Evaluator quoted: ${vehicle.price}`} style={{fontFamily:'monospace',fontSize:18}}/>
        </div>
      </>}
      <div className="field"><label>{modal==='approve'?'Approval Notes':'Rejection Reason'}</label>
        <textarea rows={3} value={comment} onChange={e=>setComment(e.target.value)} placeholder={modal==='approve'?'Optional notes...':'State reason for rejection...'} style={{resize:'vertical'}}/>
      </div>
      <div className="modal-actions">
        <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
        <button className={`btn ${modal==='approve'?'btn-success':'btn-danger'}`} onClick={()=>{
          modal==='approve'?onApprove(vehicle.id,comment,parseInt(approvedPrice)||vehicle.price):onReject(vehicle.id,comment);
          setModal(null);setComment('');setApprovedPrice('');
        }}>{modal==='approve'?'✓ Approve':'✗ Reject'}</button>
      </div>
    </Modal>}
  </div>;
}

// ═══════════════════════════════════════════════════════
//  APPROVALS
// ═══════════════════════════════════════════════════════
function Approvals({vehicles,user,onApprove,onReject,setPage,setSelectedVehicle}){
  const pending=vehicles.filter(v=>v.status==='pending'||v.status==='review');
  const [comment,setComment]=useState('');
  const [price,setPrice]=useState('');
  const [active,setActive]=useState(null);
  const [action,setAction]=useState(null);
  const algo=active?estimatePrice(active.idv,active.year,active.accidental,active.claim_history,active.odometer,active.engine,active.fuel):null;

  return<div>
    <div style={{marginBottom:16,color:'var(--text3)',fontSize:13}}>
      {pending.length} inspection{pending.length!==1?'s':''} pending your review
    </div>
    {pending.length===0&&<div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>
      <div style={{fontSize:48,marginBottom:16}}>✅</div>
      <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:'var(--text2)'}}>All caught up!</div>

          action==='approve'?onApprove(active.id,comment,parseInt(price)||active.price):onReject(active.id,comment);
          setActive(null);setComment('');setPrice('');
        }}>{action==='approve'?'✓ Confirm & Approve':'✗ Reject'}</button>
      </div>

}

// ═══════════════════════════════════════════════════════
//  EMPLOYEE DATABASE (Admin only)
// ═══════════════════════════════════════════════════════
function EmployeeDB({vehicles,showToast}){
  const [users,setUsers]=useState(CREDENTIALS);
  const [modal,setModal]=useState(null);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({name:'',username:'',password:'',role:'officer',branch:'Purnea',email:'',phone:''});
  const roleColors={admin:'var(--purple)',leader:'var(--blue)',officer:'var(--green)'};
  const roleLabels={admin:'ADMIN',leader:'UTRUST INCHARGE',officer:'UTRUST EVALUATOR'};

  function openAdd(){setForm({name:'',username:'',password:'',role:'officer',branch:'Purnea',email:'',phone:''});setEditing(null);setModal('form');}
  function openEdit(u){setForm({...u});setEditing(u.id);setModal('form');}
  function saveUser(){
    if(!form.name||!form.username||!form.password){showToast('Name, username and password required','error');return;}
    if(editing){
      setUsers(us=>us.map(u=>u.id===editing?{...u,...form}:u));
      showToast('Employee updated','success');
    }else{
      setUsers(us=>[...us,{...form,id:'U'+Date.now(),avatar:form.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}]);
      showToast('Employee added','success');
    }
    setModal(null);
  }
  function deleteUser(id){
    if(id==='U001'){showToast('Cannot delete admin','error');return;}
    setUsers(us=>us.filter(u=>u.id!==id));
    showToast('Employee removed','info');
  }

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div style={{color:'var(--text3)',fontSize:13}}>{users.length} employees registered across 3 branches</div>
      <button className="btn btn-accent btn-sm" onClick={openAdd}>➕ Add Employee</button>
    </div>

    {['admin','leader','officer'].map(role=>{
      const roleUsers=users.filter(u=>u.role===role);
      if(!roleUsers.length)return null;
      return<div key={role} style={{marginBottom:24}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>{roleLabels[role]} ({roleUsers.length})</div>
        {roleUsers.map(u=>{
          const uv=vehicles.filter(v=>v.officerId===u.id);
          return<div key={u.id} className="user-card">
            <div className={`avatar ${u.role}`} style={{width:40,height:40,fontSize:13}}>{u.avatar}</div>
            <div className="user-info">
              <div className="user-name">{u.name}</div>
              <div className="user-email">{u.username} · {u.email}</div>
              {u.branch&&<span className="user-branch-tag">📍 {u.branch}</span>}
            </div>
            <div style={{marginRight:12}}>
              <span className="badge" style={{background:`rgba(${role==='admin'?'168,85,247':role==='leader'?'59,130,246':'34,197,94'},0.15)`,color:roleColors[role],border:`1px solid rgba(${role==='admin'?'168,85,247':role==='leader'?'59,130,246':'34,197,94'},0.3)`,fontSize:10}}>{roleLabels[role]}</span>
            </div>
            {u.role==='officer'&&<div className="user-stats">
              {[['Total',uv.length],['Approved',uv.filter(v=>v.status==='approved').length],['Pending',uv.filter(v=>v.status==='pending').length]].map(([l,v])=>
                <div key={l} className="user-stat"><div className="user-stat-val">{v}</div><div className="user-stat-label">{l}</div></div>
              )}
            </div>}
            <div style={{display:'flex',gap:6,marginLeft:u.role!=='officer'?'auto':0}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(u)}>✏️ Edit</button>
              {u.id!=='U001'&&<button className="btn btn-danger btn-sm" onClick={()=>deleteUser(u.id)}>🗑</button>}
            </div>
          </div>;
        })}
      </div>;
    })}

    {modal==='form'&&<Modal title={editing?'Edit Employee':'Add New Employee'} sub="Fill in employee details and credentials" onClose={()=>setModal(null)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="field" style={{gridColumn:'span 2'}}><label>Full Name *</label><input value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="Employee full name"/></div>
        <div className="field"><label>Username *</label><input value={form.username} onChange={e=>setF('username',e.target.value)} placeholder="e.g. eval.purnea3"/></div>
        <div className="field"><label>Password *</label><input value={form.password} onChange={e=>setF('password',e.target.value)} placeholder="Strong password"/></div>
        <div className="field"><label>Role</label>
          <select value={form.role} onChange={e=>setF('role',e.target.value)}>
            <option value="officer">Utrust Evaluator</option>
            <option value="leader">Utrust Incharge</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div className="field"><label>Branch</label>
          <select value={form.branch} onChange={e=>setF('branch',e.target.value)}>
            <option>Purnea</option><option>Bhagalpur</option><option>Forbesganj</option><option>HQ</option><option>All Branches</option>
          </select>
        </div>
        <div className="field"><label>Email</label><input value={form.email} onChange={e=>setF('email',e.target.value)} placeholder="email@utrust.in"/></div>
        <div className="field"><label>Phone</label><input value={form.phone} onChange={e=>setF('phone',e.target.value)} placeholder="+91 XXXXX XXXXX"/></div>
      </div>
      <div className="modal-actions">
        <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn btn-accent" onClick={saveUser}>{editing?'Save Changes':'Add Employee'}</button>
      </div>
    </Modal>}
  </div>;
}

// ═══════════════════════════════════════════════════════
//  ANALYTICS
// ═══════════════════════════════════════════════════════
function Analytics({vehicles}){
  const total=vehicles.length;
  const approved=vehicles.filter(v=>v.status==='approved');
  const avgPrice=vehicles.filter(v=>v.price).reduce((a,b)=>a+b.price,0)/(vehicles.filter(v=>v.price).length||1);
  const brandCounts={};vehicles.forEach(v=>{if(v.brand)brandCounts[v.brand]=(brandCounts[v.brand]||0)+1;});
  const topBrands=Object.entries(brandCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxB=Math.max(...topBrands.map(b=>b[1]),1);

  return<div>
    <div className="stats-grid" style={{marginBottom:20}}>
      {[{l:'Total',v:total,i:'🚗'},{l:'Approved',v:approved.length,i:'✅'},{l:'Avg Estimate',v:fmtL(avgPrice),i:'💰'},{l:'Rejection Rate',v:`${total?Math.round(vehicles.filter(v=>v.status==='rejected').length/total*100):0}%`,i:'📉'}].map((s,i)=><div key={i} className="stat-card"><div className="stat-label">{s.l}</div><div className="stat-value">{s.v}</div><div className="stat-icon">{s.i}</div></div>)}
    </div>
    <div className="analytics-grid">
      <div className="chart-card">
        <div className="chart-title">Top Brands</div>
        <div className="bar-chart">{topBrands.map(([b,c])=><div key={b} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{b.split(' ')[0]}</div><div className="bar-track"><div className="bar-fill" style={{width:`${c/maxB*100}%`}}/></div><div className="bar-val">{c}</div></div>)}</div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Branch Breakdown</div>
        <div className="bar-chart">{['Purnea','Bhagalpur','Forbesganj'].map(b=>{const c=vehicles.filter(v=>v.branch===b).length;return<div key={b} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{b}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:'var(--blue)'}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Fuel Distribution</div>
        <div className="bar-chart">{['Petrol','Diesel','CNG','Electric','Hybrid'].map(f=>{const c=vehicles.filter(v=>v.fuel===f).length;const cols={Petrol:'var(--accent)',Diesel:'var(--blue)',Electric:'var(--green)',CNG:'var(--purple)',Hybrid:'#22d3ee'};return<div key={f} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{f}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:cols[f]}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Price Range</div>
        <div className="bar-chart">{[['<3L',0,300000],['3–6L',300000,600000],['6–10L',600000,1000000],['10–20L',1000000,2000000],['>20L',2000000,Infinity]].map(([l,mn,mx])=>{const c=vehicles.filter(v=>v.price>=mn&&v.price<mx).length;return<div key={l} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{l}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:'var(--purple)'}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
    </div>
  </div>;
}

    </div>

    <div class="section"><div class="section-title">Vehicle Details</div>
      <div class="grid3">
        ${[['Registration',vehicle.reg],['Brand',vehicle.brand],['Model',vehicle.model],['Variant',vehicle.variant||'—'],['Year',vehicle.year],['Fuel',vehicle.fuel],['Transmission',vehicle.transmission],['Odometer',`${vehicle.odometer?.toLocaleString('en-IN')} km`],['Ownership',vehicle.ownership]].map(([l,v])=>`<div class="field"><div class="field-label">${l}</div><div class="field-val">${v||'—'}</div></div>`).join('')}
      </div>
    </div>

    <div class="section"><div class="section-title">Vehicle Photos</div>
      <div class="photo-grid">${photosHTML}</div>
    </div>

    <div class="section"><div class="section-title">Insurance Details</div>
      <div class="grid">
        <div class="field"><div class="field-label">IDV</div><div class="field-val">₹${vehicle.idv?.toLocaleString('en-IN')||'—'}</div></div>
        <div class="field"><div class="field-label">OD Valid Until</div><div class="field-val">${vehicle.insurance_valid_od||vehicle.insurance_valid||'—'}</div></div>
        <div class="field"><div class="field-label">TP Valid Until</div><div class="field-val">${vehicle.insurance_valid_tp||'—'}</div></div>
        <div class="field"><div class="field-label">Claim History</div><div class="field-val">${vehicle.claim_history||'—'}</div></div>
      </div>
    </div>

    <div class="section"><div class="section-title">Condition Assessment</div>
      ${[['Engine Condition',vehicle.engine],['Tyres',vehicle.tyres],['Battery',vehicle.battery],['Electricals',vehicle.electricals],['Accidental History',vehicle.accidental],['Flood Damage',vehicle.flood],['Overall Rating',`${vehicle.rating}/10`]].map(([k,v])=>{
        const cls=(v==='Excellent'||v==='Good'||v==='No')?'good-c':(v==='Worn'||v==='Dead'||v==='Issues'||v==='Yes'||v==='Poor')?'bad-c':'';
        return`<div class="cond-item"><span>${k}</span><span class="${cls}">${v||'—'}</span></div>`;
      }).join('')}
      ${vehicle.remarks?`<div style="margin-top:10px;padding:10px;background:#fffbf0;border-radius:6px;font-size:12px;border-left:3px solid #f5a623;"><b>Remarks:</b> ${vehicle.remarks}</div>`:''}
    </div>

    ${algo?`<div class="section"><div class="section-title">Price Algorithm Breakdown</div>
      ${algo.steps.map(s=>`<div class="algo-row"><span>${s.label}</span><span style="font-family:monospace;font-weight:600;color:${s.type==='result'?'#f5a623':s.type==='deduct'?'#ef4444':s.type==='bonus'?'#22c55e':'#111'}">${s.type==='base'?'₹'+Math.round(s.val).toLocaleString('en-IN'):s.type==='result'?'₹'+(s.val/100000).toFixed(2)+'L':(s.val>=0?'+':'')+'₹'+Math.abs(Math.round(s.val)).toLocaleString('en-IN')}</span></div>`).join('')}
    </div>`:''}

    <div class="price-box">
      <div class="price-item"><div class="price-label">Evaluator Estimate</div><div class="price-val">₹${(vehicle.price/100000).toFixed(2)}L</div></div>
      ${algo?`<div class="price-item"><div class="price-label">Algorithm Suggested</div><div class="price-val" style="color:#9aa3b8">₹${(algo.price/100000).toFixed(2)}L</div></div>`:''}
      ${vehicle.approved_price?`<div class="price-item"><div class="price-label">Incharge Approved</div><div class="price-val green">₹${(vehicle.approved_price/100000).toFixed(2)}L</div></div>`:''}
    </div>

    <div class="sig-grid">
      <div class="sig">Utrust Evaluator<br/><b>${vehicle.officer}</b><br/>${vehicle.branch} Branch</div>
      <div class="sig">Utrust Incharge<br/><b>${vehicle.approved_price?'Price Approved':'Pending Approval'}</b></div>
      <div class="sig">Seller Signature &amp; Stamp<br/><br/></div>
    </div>
  </div>
  <div class="footer">Utrust Used Vehicle Management System · Report generated: ${new Date().toLocaleString('en-IN')} · This is a system-generated document.</div>
  <div style="text-align:center;padding:16px;"><button onclick="window.print()" style="padding:10px 28px;background:#f5a623;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;">🖨 Print / Save as PDF</button></div>
  </body></html>`);
  win.document.close();
}

// ═══════════════════════════════════════════════════════
//  APP ROOT — Firebase connected
// ═══════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [vehicles,setVehicles]=useState(INITIAL_VEHICLES);
  const [selectedVehicle,setSelectedVehicle]=useState(null);
  const [toast,setToast]=useState(null);
  const [fbReady,setFbReady]=useState(!!window.FB_READY);
  const [dbLive,setDbLive]=useState(false);
  const [saving,setSaving]=useState(false);

  const showToast=(msg,type='success')=>setToast({msg,type});

  // Wait for Firebase module to finish loading
  useEffect(()=>{
    if(window.FB_READY){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener('fb-ready',h);
    return()=>window.removeEventListener('fb-ready',h);
  },[]);

  // Subscribe to Firestore once Firebase is ready and user is logged in
  useEffect(()=>{
    if(!fbReady||!user)return;
    let unsub;
    try{
      unsub=window.FB.fbListenVehicles(docs=>{
        setDbLive(true);
        setVehicles(docs.length>0 ? docs : INITIAL_VEHICLES);
        if(docs.length===0){
          // Seed Firestore with sample data on first run
          window.FB.fbSeedIfEmpty(INITIAL_VEHICLES).catch(()=>{});
        }
      });
    }catch(e){
      console.warn('Firestore unavailable, using local state',e);
    }
    return()=>{if(unsub)unsub();};
  },[fbReady,user]);

  const pendingCount=vehicles.filter(v=>v.status==='pending'||v.status==='review').length;

  async function handleApprove(id,comment,approvedPrice){
    const updates={status:'approved',approved:new Date().toISOString().slice(0,10),approved_price:approvedPrice,approval_comment:comment};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Vehicle approved & price set!','success');
  }

  async function handleReject(id,comment){
    const updates={status:'rejected',rejection_comment:comment};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Vehicle inspection rejected.','error');
  }

  async function handleUpdatePrice(id,price){
    const updates={approved_price:price};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Approved price updated!','success');
  }

  async function handleNewVehicle(vehicle){
    setSaving(true);
    showToast('Compressing photos & saving to cloud...','info');
    // Optimistic update
    setVehicles(vs=>[vehicle,...vs]);
    setPage('vehicles');
    if(fbReady&&window.FB){
      try{
        await window.FB.fbSaveVehicle(vehicle);
        showToast(vehicle.status==='draft'?'Draft saved to cloud!':'Submitted for Incharge approval!',vehicle.status==='draft'?'info':'success');
      }catch(e){
        console.warn('Firebase save failed, keeping local',e);
        showToast('Saved locally (check internet connection)','info');
      }
    } else {
      showToast(vehicle.status==='draft'?'Draft saved!':'Submitted for approval!',vehicle.status==='draft'?'info':'success');
    }
    setSaving(false);
  }

  async function handleDelete(id){
    setVehicles(vs=>vs.filter(v=>v.id!==id));
    if(fbReady&&window.FB){try{await window.FB.fbDeleteVehicle(id);}catch(e){console.warn(e);}}
    showToast('Vehicle record deleted.','info');
  }

  const titles={dashboard:'Dashboard',vehicles:user?.role==='officer'?'My Inspections':'All Vehicles',add:'New Inspection',approval:'Pending Approvals',reports:'Analytics',users:'Employee Database',detail:'Vehicle Detail',hosting:'Hosting Guide'};

  if(!user)return<Login onLogin={u=>{setUser(u);setPage('dashboard');}}/>;

  const renderPage=()=>{
    if(page==='dashboard')return<Dashboard vehicles={vehicles} user={user} setPage={setPage}/>;
    if(page==='vehicles')return<VehiclesList vehicles={vehicles} user={user} setPage={setPage} setSelectedVehicle={setSelectedVehicle} onAddNew={()=>setPage('add')} onDelete={handleDelete}/>;
    if(page==='add')return<NewInspection user={user} onSubmit={handleNewVehicle} onCancel={()=>setPage('vehicles')} showToast={showToast}/>;
    if(page==='approval')return<Approvals vehicles={vehicles} user={user} onApprove={handleApprove} onReject={handleReject} setPage={setPage} setSelectedVehicle={setSelectedVehicle}/>;
    if(page==='reports')return<Analytics vehicles={vehicles}/>;
    if(page==='users')return<EmployeeDB vehicles={vehicles} showToast={showToast}/>;
    if(page==='hosting')return<HostingGuide/>;
    if(page==='detail')return<VehicleDetail vehicle={selectedVehicle} user={user} onBack={()=>setPage('vehicles')} onApprove={handleApprove} onReject={handleReject} onGeneratePDF={generatePDF} onUpdatePrice={handleUpdatePrice}/>;
    return<Dashboard vehicles={vehicles} user={user} setPage={setPage}/>;
  };

  return<>
    <Sidebar user={user} page={page} setPage={setPage} onLogout={()=>{setUser(null);setPage('dashboard');}} pendingCount={pendingCount}/>
    <div className="main">
      <div className="topbar">
        <div>
          <div className="topbar-title">{titles[page]||'Utrust'}</div>
          <div className="topbar-sub">Utrust Vehicle Management · {user.branch}</div>
        </div>
        <div className="topbar-actions">
          {/* Cloud sync indicator */}
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,fontFamily:'DM Mono,monospace',padding:'3px 8px',borderRadius:4,background:dbLive?'var(--green-dim)':'var(--surface2)',border:`1px solid ${dbLive?'rgba(34,197,94,0.3)':'var(--border)'}`,color:dbLive?'var(--green)':'var(--text3)'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:dbLive?'var(--green)':'var(--text3)',display:'inline-block',animation:dbLive?'pulse 2s infinite':'none'}}/>
            {saving?'Saving...':dbLive?'Cloud Live':'Local'}
          </div>
          <div style={{fontSize:11,color:'var(--text3)',fontFamily:'DM Mono,monospace'}}>{new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
          {page!=='add'&&(user.role==='officer'||user.role==='admin')&&<button className="btn btn-accent btn-sm" onClick={()=>setPage('add')}>➕ New</button>}
        </div>
      </div>
      <div className="content">{renderPage()}</div>
    </div>
    {toast&&<Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
