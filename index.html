<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utrust — Used Vehicle Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- Firebase SDKs — Firestore only (Spark free plan, no Storage needed) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
           onSnapshot, query, orderBy, serverTimestamp, writeBatch, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDazZSs72-ObVlMWcfCryKh7hwTtUmQ_LA",
    authDomain: "utrust-app.firebaseapp.com",
    projectId: "utrust-app",
    storageBucket: "utrust-app.firebasestorage.app",
    messagingSenderId: "779202883931",
    appId: "1:779202883931:web:5855c6e3023e4c3249aa7e"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);

  // ── Compress a base64 image to ~30 KB JPEG using canvas ──
  // Firestore document limit is 1 MB. With 8 photos per vehicle we target
  // ~80 KB each → total ~640 KB well inside the limit.
  function compressImage(dataUrl, maxW = 800, quality = 0.55) {
    return new Promise(resolve => {
      if (!dataUrl || !dataUrl.startsWith('data:')) { resolve(dataUrl); return; }
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // ── Compress every photo slot in the photos map ──
  async function compressAllPhotos(photos) {
    const out = {};
    for (const [slot, val] of Object.entries(photos || {})) {
      out[slot] = val ? await compressImage(val) : null;
    }
    return out;
  }

  // ── Save new vehicle — photos stored inline in Firestore ──
  async function fbSaveVehicle(vehicle) {
    const { photos, ...rest } = vehicle;
    // Compress photos first
    const compPhotos = await compressAllPhotos(photos || {});
    const docRef = await addDoc(collection(db, 'vehicles'), {
      ...rest,
      photos: compPhotos,
      createdAt: serverTimestamp(),
    });
    // Write back the Firestore-generated id into the doc
    await updateDoc(docRef, { id: docRef.id });
    return docRef.id;
  }

  // ── Update an existing vehicle ──
  async function fbUpdateVehicle(id, updates) {
    const { photos, ...rest } = updates;
    const payload = { ...rest };
    if (photos) {
      payload.photos = await compressAllPhotos(photos);
    }
    await updateDoc(doc(db, 'vehicles', id), payload);
  }

  // ── Delete a vehicle ──
  async function fbDeleteVehicle(id) {
    await deleteDoc(doc(db, 'vehicles', id));
  }

  // ── Real-time listener ──
  function fbListenVehicles(callback) {
    const q = query(collection(db, 'vehicles'), orderBy('createdAt', 'desc'));
    return onSnapshot(q, snap => {
      const docs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      callback(docs);
    }, err => {
      console.error('Firestore error:', err);
    });
  }

  // ── Seed initial sample vehicles if Firestore is empty ──
  async function fbSeedIfEmpty(initialVehicles) {
    const snap = await getDocs(collection(db, 'vehicles'));
    if (snap.empty) {
      for (const v of initialVehicles) {
        await addDoc(collection(db, 'vehicles'), {
          ...v, photos: {}, createdAt: serverTimestamp()
        });
      }
    }
  }

  window.FB = { fbSaveVehicle, fbUpdateVehicle, fbDeleteVehicle, fbListenVehicles, fbSeedIfEmpty };
  window.FB_READY = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0d;--surface:#111318;--surface2:#181c23;--surface3:#1e2330;--border:#252b38;--border2:#2e3545;--accent:#f5a623;--accent2:#e8912a;--accent-dim:rgba(245,166,35,0.12);--accent-dim2:rgba(245,166,35,0.06);--green:#22c55e;--green-dim:rgba(34,197,94,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--purple:#a855f7;--text:#e8eaf0;--text2:#9aa3b8;--text3:#5a6480;--radius:8px;--radius2:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
#root{display:flex;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* LOGIN */
.login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(245,166,35,0.08) 0%,transparent 70%);}
.login-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.25;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:44px 40px;width:460px;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.6);}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.login-logo-icon{width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;}
.login-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.02em;}
.login-logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:4px;}
.login-subtitle{color:var(--text2);margin-bottom:28px;font-size:13px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:0.08em;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;transition:border-color 0.15s;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:var(--surface2);}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 20px rgba(245,166,35,0.3);}
.creds-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px;}
.creds-title{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.cred-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border);}
.cred-row:last-child{border-bottom:none;}
.cred-key{color:var(--text3);}
.cred-val{font-family:'DM Mono',monospace;color:var(--accent);font-size:11px;}

/* SIDEBAR */
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo-icon{width:36px;height:36px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sidebar-logo-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.sidebar-logo-ver{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.06em;}
.sidebar-user{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.avatar.admin{background:rgba(168,85,247,0.2);color:var(--purple);border:1px solid rgba(168,85,247,0.3);}
.avatar.leader{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.avatar.officer{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.sidebar-user-name{font-size:12px;font-weight:600;line-height:1.2;}
.sidebar-user-role{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.sidebar-user-branch{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;}
.sidebar-section{padding:10px 14px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all 0.15s;font-size:13px;color:var(--text2);font-weight:500;position:relative;margin:1px 8px;border-radius:var(--radius);}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace;}
.nav-badge.accent{background:var(--accent);color:#000;}
.sidebar-footer{margin-top:auto;padding:14px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text3);font-family:'Instrument Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10;}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--text3);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:8px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{background:var(--accent2);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.btn-success:hover{background:rgba(34,197,94,0.2);}
.btn-sm{padding:5px 10px;font-size:12px;}
.content{flex:1;padding:24px;overflow-y:auto;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.2s;}
.stat-card:hover::after{transform:scaleX(1);}
.stat-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:3px;}
.stat-change{font-size:11px;color:var(--green);}
.stat-icon{position:absolute;top:16px;right:16px;font-size:22px;opacity:0.25;}

/* TABLE */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Mono',monospace;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
.badge-pending{background:rgba(245,166,35,0.15);color:var(--accent);border:1px solid rgba(245,166,35,0.25);}
.badge-approved{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.badge-rejected{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.badge-draft{background:var(--surface3);color:var(--text3);border:1px solid var(--border2);}
.badge-review{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.25);}

/* FORM */
.form-container{max-width:880px;}
.step-progress{display:flex;margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.step{flex:1;padding:11px 6px;text-align:center;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase;font-family:'DM Mono',monospace;border-right:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.step:last-child{border-right:none;}
.step.active{background:var(--accent-dim);color:var(--accent);}
.step.done{color:var(--green);background:var(--green-dim);}
.step-num{display:block;font-size:16px;font-family:'Syne',sans-serif;font-weight:800;margin-bottom:1px;}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:16px;}
.form-card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.form-card-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.three{grid-template-columns:1fr 1fr 1fr;}
.form-grid.full{grid-template-columns:1fr;}
.span2{grid-column:span 2;}
.span3{grid-column:span 3;}
.combo-input{display:flex;gap:0;}
.combo-input select{border-radius:var(--radius) 0 0 var(--radius);border-right:none;flex:1;}
.combo-input input{border-radius:0 var(--radius) var(--radius) 0;flex:1;background:var(--surface2);border:1px solid var(--border);border-left:none;padding:10px 14px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;outline:none;}
.combo-input input:focus{border-color:var(--accent);}

/* CAMERA */
.camera-container{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius2);overflow:hidden;}
.camera-preview{width:100%;aspect-ratio:4/3;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
.camera-preview video{width:100%;height:100%;object-fit:cover;}
.camera-preview canvas{width:100%;height:100%;object-fit:cover;}
.camera-controls{padding:12px;display:flex;gap:8px;justify-content:center;border-top:1px solid var(--border);}
.camera-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.camera-slot{background:var(--surface2);border:2px dashed var(--border2);border-radius:var(--radius2);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.camera-slot:hover{border-color:var(--accent);}
.camera-slot.captured{border-style:solid;border-color:var(--green);}
.camera-slot-preview{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;background:#000;}
.camera-slot-preview img{width:100%;height:100%;object-fit:cover;}
.camera-slot-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;}
.camera-slot-label{font-size:11px;text-align:center;padding:8px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface2);letter-spacing:0.04em;}
.camera-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.camera-modal-video{width:100%;max-width:500px;border-radius:var(--radius2);overflow:hidden;background:#000;}
.camera-modal-video video{width:100%;display:block;}
.camera-modal-actions{display:flex;gap:14px;margin-top:16px;}
.shutter-btn{width:68px;height:68px;border-radius:50%;background:var(--accent);border:4px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all 0.15s;}
.shutter-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(245,166,35,0.5);}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius2);padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface2);}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-dim2);}
.upload-zone.uploaded{border-style:solid;border-color:var(--green);background:var(--green-dim);}
.upload-icon{font-size:24px;margin-bottom:8px;display:block;}
.upload-label{font-size:12px;font-weight:600;color:var(--text2);}
.upload-sub{font-size:10px;color:var(--text3);margin-top:3px;}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:8px;}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);}
.check-label{font-size:13px;font-weight:500;}
.check-controls{display:flex;gap:5px;}
.check-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;transition:all 0.15s;color:var(--text3);}
.check-btn.good{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.check-btn.bad{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.check-btn.warn{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

/* RATING */
.rating{display:flex;gap:5px;}
.rating-btn{width:34px;height:34px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.rating-btn:hover{border-color:var(--accent);color:var(--accent);}
.rating-btn.selected{background:var(--accent);border-color:var(--accent);color:#000;}

/* PRICE ALGO */
.algo-box{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px;margin-bottom:16px;}
.algo-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.algo-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.algo-breakdown{display:flex;flex-direction:column;gap:6px;}
.algo-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);}
.algo-row:last-child{border-bottom:none;font-weight:700;font-size:14px;}
.algo-key{color:var(--text3);}
.algo-val{font-family:'DM Mono',monospace;color:var(--text);}
.algo-val.minus{color:var(--red);}
.algo-val.result{color:var(--accent);font-size:16px;}
.algo-suggest{font-size:11px;color:var(--text3);margin-top:10px;padding:10px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid var(--accent);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:520px;box-shadow:0 40px 80px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:5px;}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* APPROVAL */
.approval-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:18px;}
.approval-thumb{width:90px;height:64px;border-radius:var(--radius);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:1px solid var(--border);}
.approval-meta{flex:1;min-width:0;}
.approval-reg{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);margin-bottom:3px;}
.approval-car{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;}
.approval-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.approval-price{font-size:18px;font-family:'Syne',sans-serif;font-weight:800;color:var(--green);}
.approval-officer{font-size:10px;color:var(--text3);margin-top:2px;}
.approval-actions{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}

/* USER MGMT */
.user-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:10px;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:600;}
.user-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.user-branch-tag{display:inline-block;font-size:9px;font-family:'DM Mono',monospace;color:var(--accent);background:var(--accent-dim);padding:2px 6px;border-radius:4px;margin-top:2px;border:1px solid rgba(245,166,35,0.2);}
.user-stats{display:flex;gap:16px;}
.user-stat{text-align:center;}
.user-stat-val{font-size:16px;font-weight:700;font-family:'Syne',sans-serif;}
.user-stat-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;}

/* DETAIL */
.detail-sections{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;}
.detail-card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:11px;color:var(--text3);}
.detail-val{font-size:12px;font-weight:600;text-align:right;}

/* PHOTO */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.photo-thumb{aspect-ratio:4/3;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-label{font-size:9px;color:var(--text3);text-align:center;margin-top:3px;font-family:'DM Mono',monospace;}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;}
.chart-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:18px;}
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{width:90px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0;}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);}
.bar-val{width:36px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

/* TIMELINE */
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--border);}
.timeline-item{position:relative;margin-bottom:18px;}
.timeline-dot{position:absolute;left:-18px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);}
.timeline-dot.done{background:var(--green);border-color:var(--green);}
.timeline-dot.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent);}
.timeline-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.timeline-label{font-size:12px;font-weight:600;margin:1px 0;}
.timeline-desc{font-size:11px;color:var(--text3);}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius2);padding:12px 18px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 20px 40px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--accent);}

/* MISC */
.search-bar{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;}
.search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;width:180px;}
.price-big{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--accent);}
.hosting-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:24px;margin-bottom:16px;}
.hosting-card h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.hosting-card p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6;}
.step-list{display:flex;flex-direction:column;gap:8px;}
.step-li{display:flex;gap:10px;font-size:13px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);}
.step-li-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px;}
.code-inline{font-family:'DM Mono',monospace;background:var(--surface3);padding:2px 7px;border-radius:4px;font-size:12px;color:var(--accent);border:1px solid var(--border);}
.note-box{background:var(--accent-dim);border:1px solid rgba(245,166,35,0.25);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--accent);margin-top:12px;}

@media(max-width:900px){
  .sidebar{width:56px;}
  .sidebar-logo-name,.sidebar-logo-ver,.sidebar-user-name,.sidebar-user-role,.sidebar-user-branch,.nav-item span:not(.nav-icon),.nav-badge,.sidebar-section{display:none;}
  .nav-item{justify-content:center;padding:10px;}
  .sidebar-user{justify-content:center;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .span2,.span3{grid-column:span 1;}
  .detail-sections{grid-template-columns:1fr;}
  .analytics-grid{grid-template-columns:1fr;}
  .camera-grid{grid-template-columns:1fr 1fr;}
}

//  PRICE ESTIMATION ALGORITHM
// ═══════════════════════════════════════════════════════
// insuranceExpired=true → use purchaseValue as base with heavier depreciation
function estimatePrice(idv, year, accidental, claimHistory, odometer, engine, fuel, insuranceExpired, purchaseValue){
  const baseValue=insuranceExpired?purchaseValue:idv;
  if(!baseValue||!year) return null;
  const currentYear=new Date().getFullYear();
  const age=currentYear-parseInt(year);
  let price=parseFloat(baseValue);
  const steps=[];

  if(insuranceExpired){
    steps.push({label:'Base: Original purchase value (insurance expired)',val:price,type:'base'});
    // Extra 10% penalty for no current insurance (can't verify current market value)
    const noInsPenalty=price*0.10;
    price-=noInsPenalty;
    steps.push({label:'No current insurance penalty (10%)',val:-noInsPenalty,type:'deduct'});
  } else {
    steps.push({label:'Base IDV (current insured value)',val:price,type:'base'});
  }

  // Depreciation by age — higher rates when insurance is expired (more uncertainty)
  const depRatesNormal=[0,0.05,0.10,0.15,0.20,0.25,0.30,0.38,0.46,0.52,0.58,0.63,0.67,0.70,0.73,0.76,0.78,0.80,0.82,0.84,0.86];
  const depRatesExpired=[0,0.08,0.14,0.20,0.27,0.33,0.40,0.48,0.55,0.61,0.66,0.71,0.75,0.78,0.81,0.84,0.86,0.88,0.89,0.90,0.91];
  const depTable=insuranceExpired?depRatesExpired:depRatesNormal;
  const dep=depTable[Math.min(age,20)]||0.91;
  const depAmt=price*dep;
  price-=depAmt;
  steps.push({label:`Age depreciation (${age}yr, ${Math.round(dep*100)}%${insuranceExpired?' — higher due to expired insurance':''})`,val:-depAmt,type:'deduct'});

  // Odometer correction
  if(odometer){
    const odo=parseInt(odometer);
    const avgAnnual=12000;
    const expectedKm=age*avgAnnual;
    const diff=odo-expectedKm;
    if(diff>0){
      const penalty=Math.min(diff*0.8,price*0.08);
      price-=penalty;
      steps.push({label:`High odometer penalty (+${Math.round(diff/1000)}K km over avg)`,val:-penalty,type:'deduct'});
    } else if(diff<-5000){
      const bonus=Math.min(Math.abs(diff)*0.3,price*0.04);
      price+=bonus;
      steps.push({label:'Low odometer bonus',val:bonus,type:'bonus'});
    }
  }

  // Accidental history
  if(accidental==='Yes'){
    const pen=price*0.12;
    price-=pen;
    steps.push({label:'Accidental vehicle penalty (12%)',val:-pen,type:'deduct'});
  }

  // Claim history
  const claimMap={'None':0,'1 Minor':0.04,'1 Major':0.10,'2+ Claims':0.15,'Unknown':0.06};
  const claimPct=claimMap[claimHistory]||0;
  if(claimPct>0){
    const pen=price*claimPct;
    price-=pen;
    steps.push({label:`Claim history deduction (${claimHistory})`,val:-pen,type:'deduct'});
  }

  // Engine condition
  const engMap={'Excellent':0.03,'Good':0,'Fair':-0.05,'Poor':-0.12};
  const engAdj=engMap[engine]||0;
  if(engAdj!==0){
    const adj=price*engAdj;
    price+=adj;
    steps.push({label:`Engine condition (${engine})`,val:adj,type:engAdj>0?'bonus':'deduct'});
  }

  // Fuel type premium/discount
  const fuelAdj={'Diesel':0.03,'Electric':0.05,'Hybrid':0.04,'CNG':-0.02,'Petrol':0,'LPG':-0.03};
  const fAdj=fuelAdj[fuel]||0;
  if(fAdj!==0){
    const adj=price*fAdj;
    price+=adj;
    steps.push({label:`Fuel type factor (${fuel})`,val:adj,type:fAdj>0?'bonus':'deduct'});
  }

  // Dealer margin (buy at 8% below estimated)
  const margin=price*0.08;
  price-=margin;
  steps.push({label:'Dealer purchase margin (8%)',val:-margin,type:'deduct'});

  price=Math.max(price,10000);
  steps.push({label:'Recommended Purchase Price',val:price,type:'result'});

  return {price:Math.round(price),steps};
}

//  CAMERA COMPONENT — fixed rear-first, retake, flip
// ═══════════════════════════════════════════════════════
function CameraCapture({label,onCapture,captured}){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const [open,setOpen]=useState(false);
  const [err,setErr]=useState('');
  const [facing,setFacing]=useState('environment'); // environment = rear camera

  async function startCamera(facingMode){
    setErr('');
    // Stop any existing stream first
    if(streamRef.current){
      streamRef.current.getTracks().forEach(t=>t.stop());
      streamRef.current=null;
    }
    const constraints={
      video:{
        facingMode:{ideal:facingMode||'environment'},
        width:{ideal:1280},
        height:{ideal:960},
      }
    };
    try{
      const s=await navigator.mediaDevices.getUserMedia(constraints);
      streamRef.current=s;
      if(videoRef.current){
        videoRef.current.srcObject=s;
        await videoRef.current.play().catch(()=>{});
      }
      setFacing(facingMode||'environment');
      setOpen(true);
    }catch(e){
      // Fallback: try without facingMode constraint
      try{
        const s2=await navigator.mediaDevices.getUserMedia({video:true});
        streamRef.current=s2;
        if(videoRef.current){
          videoRef.current.srcObject=s2;
          await videoRef.current.play().catch(()=>{});
        }
        setOpen(true);
      }catch(e2){
        setErr('Camera access denied. Please allow camera permission in your browser settings.');
      }
    }
  }

  function stopCamera(){
    if(streamRef.current){
      streamRef.current.getTracks().forEach(t=>t.stop());
      streamRef.current=null;
    }
    if(videoRef.current) videoRef.current.srcObject=null;
    setOpen(false);
  }

  function capture(){
    const v=videoRef.current,c=canvasRef.current;
    if(!v||!c)return;
    c.width=v.videoWidth||640;
    c.height=v.videoHeight||480;
    const ctx=c.getContext('2d');
    ctx.drawImage(v,0,0,c.width,c.height);
    // Timestamp watermark
    const ts=new Date().toLocaleString('en-IN');
    const barH=Math.round(c.height*0.06);
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(0,c.height-barH,c.width,barH);
    ctx.fillStyle='#f5a623';
    ctx.font=`bold ${Math.round(barH*0.55)}px monospace`;
    ctx.fillText('📍 '+ts+' | Utrust',10,c.height-Math.round(barH*0.22));
    const dataUrl=c.toDataURL('image/jpeg',0.88);
    stopCamera();
    onCapture(dataUrl);
  }

  async function flipCamera(){
    const next=facing==='environment'?'user':'environment';
    await startCamera(next);
  }

  // Cleanup on unmount
  useEffect(()=>()=>{
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
  },[]);

  return<>
    <div className={`camera-slot ${captured?'captured':''}`} onClick={()=>{ if(!captured){ startCamera(facing); } }}>
      <div className="camera-slot-preview">
        {captured
          ?<img src={captured} alt={label} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          :<div className="camera-slot-placeholder">
            <span style={{fontSize:26,marginBottom:6}}>📷</span>
            <span style={{fontSize:11,color:err?'var(--red)':'var(--text3)',textAlign:'center',padding:'0 4px'}}>{err||'Tap to capture'}</span>
          </div>
        }
      </div>
      <div className="camera-slot-label">{label}{captured?' ✓':''}</div>
    </div>
    {captured&&<div style={{display:'flex',gap:4,marginTop:4}}>
      <button className="btn btn-danger btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();onCapture(null);startCamera(facing);}}>🔄 Retake</button>
    </div>}

    {open&&<div className="camera-modal" style={{zIndex:500}}>
      <div style={{color:'#fff',fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,marginBottom:10,textAlign:'center'}}>{label}</div>
      <div className="camera-modal-video" style={{position:'relative',width:'100%',maxWidth:480,borderRadius:12,overflow:'hidden',background:'#000'}}>
        <video ref={videoRef} autoPlay playsInline muted style={{width:'100%',display:'block',minHeight:200}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
      </div>
      <div className="camera-modal-actions" style={{marginTop:14}}>
        <button className="btn btn-ghost" style={{minWidth:80}} onClick={stopCamera}>✕ Cancel</button>
        <button className="shutter-btn" onClick={capture} title="Capture photo">📸</button>
        <button className="btn btn-ghost" style={{minWidth:80}} onClick={flipCamera}>🔄 Flip</button>
      </div>
      <div style={{color:'var(--text3)',fontSize:10,marginTop:8,fontFamily:'DM Mono,monospace',textAlign:'center'}}>
        {facing==='environment'?'🔙 Rear camera':'🤳 Front camera'} · Timestamp auto-embedded
      </div>
    </div>}
  </>;
}

function Dashboard({vehicles,user,setPage}){
  const mine=user.role==='officer'?vehicles.filter(v=>v.officerId===user.id):vehicles;
  const total=mine.length;
  const approved=mine.filter(v=>v.status==='approved').length;
  const pending=mine.filter(v=>v.status==='pending'||v.status==='review').length;
  const avgPrice=mine.filter(v=>v.price).reduce((a,b)=>a+b.price,0)/(mine.filter(v=>v.price).length||1);
  const recent=[...mine].sort((a,b)=>(b.submitted||'').localeCompare(a.submitted||'')).slice(0,5);

  return<div>
    <div className="stats-grid">
      {[
        {label:'Total Inspections',value:total,icon:'🚗',sub:'vehicles recorded'},
        {label:'Approved',value:approved,icon:'✅',sub:`${total?Math.round(approved/total*100):0}% approval rate`},
        {label:'Pending Review',value:pending,icon:'⏳',sub:'awaiting decision'},
        {label:'Avg Purchase Price',value:fmtL(avgPrice),icon:'💰',sub:'across all vehicles'},
      ].map((s,i)=><div key={i} className="stat-card">
        <div className="stat-label">{s.label}</div>
        <div className="stat-value">{s.value}</div>
        <div className="stat-change">{s.sub}</div>
        <div className="stat-icon">{s.icon}</div>
      </div>)}
    </div>

    {user.role!=='officer'&&<div className="analytics-grid" style={{marginBottom:24}}>
      <div className="chart-card">
        <div className="chart-title">Branch Performance</div>
        <div className="bar-chart">
          {['Purnea','Bhagalpur','Forbesganj'].map(b=>{
            const cnt=vehicles.filter(v=>v.branch===b).length;
            const max=Math.max(...['Purnea','Bhagalpur','Forbesganj'].map(x=>vehicles.filter(v=>v.branch===x).length))||1;
            return<div key={b} className="bar-row">
              <div className="bar-label" style={{fontSize:11}}>{b}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${cnt/max*100}%`}}/></div>
              <div className="bar-val">{cnt}</div>
            </div>;
          })}
        </div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Status Overview</div>
        <div className="bar-chart">
          {[{l:'Approved',s:'approved',c:'var(--green)'},{l:'Pending',s:'pending',c:'var(--accent)'},{l:'Rejected',s:'rejected',c:'var(--red)'},{l:'Draft',s:'draft',c:'var(--text3)'}].map(b=>{
            const cnt=vehicles.filter(v=>v.status===b.s).length;
            return<div key={b.l} className="bar-row">
              <div className="bar-label" style={{fontSize:11}}>{b.l}</div>
              <div className="bar-track"><div className="bar-fill" style={{width:`${total?cnt/total*100:0}%`,background:b.c}}/></div>
              <div className="bar-val">{cnt}</div>
            </div>;
          })}
        </div>
      </div>
    </div>}

    <div className="table-container">
      <div className="table-header">
        <div className="table-title">Recent Inspections</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setPage('vehicles')}>View All →</button>
      </div>
      <table>
        <thead><tr><th>Reg No.</th><th>Vehicle</th><th>Branch</th><th>Price</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>{recent.map(v=><tr key={v.id}>
          <td><span style={{fontFamily:'monospace',color:'var(--accent)',fontSize:12,fontWeight:600}}>{v.reg}</span></td>
          <td><b>{v.brand} {v.model}</b> <span style={{color:'var(--text3)',fontSize:11}}>{v.year}</span></td>
          <td><span style={{fontSize:11,color:'var(--text2)'}}>{v.branch}</span></td>
          <td style={{fontFamily:'monospace',fontWeight:700,color:'var(--green)'}}>{fmtL(v.price)}</td>
          <td><StatusBadge status={v.status}/></td>
          <td style={{color:'var(--text3)',fontSize:11}}>{v.submitted}</td>
        </tr>)}
        {recent.length===0&&<tr><td colSpan={6} style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>No inspections yet</td></tr>}
        </tbody>
      </table>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════
//  VEHICLES LIST
// ═══════════════════════════════════════════════════════
function VehiclesList({vehicles,user,setPage,setSelectedVehicle,onAddNew,onDelete}){
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [branch,setBranch]=useState('all');
  const myVehicles=user.role==='officer'?vehicles.filter(v=>v.officerId===user.id):vehicles;
  const filtered=myVehicles.filter(v=>{
    const q=search.toLowerCase();
    const m=!q||(v.reg||'').toLowerCase().includes(q)||(v.brand||'').toLowerCase().includes(q)||(v.model||'').toLowerCase().includes(q)||(v.officer||'').toLowerCase().includes(q);
    const sm=filter==='all'||v.status===filter;
    const bm=branch==='all'||v.branch===branch;
    return m&&sm&&bm;
  });

  return<div>
    <div style={{display:'flex',gap:10,marginBottom:18,alignItems:'center',flexWrap:'wrap'}}>
      <div className="search-bar">
        <span>🔍</span>
        <input placeholder="Search reg, brand, model..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      {user.role!=='officer'&&<select style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'7px 12px',color:'var(--text)',fontSize:13,outline:'none'}} value={branch} onChange={e=>setBranch(e.target.value)}>
        <option value="all">All Branches</option>
        <option>Purnea</option><option>Bhagalpur</option><option>Forbesganj</option>
      </select>}
      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
        {['all','approved','pending','review','rejected','draft'].map(f=><button key={f} className={`btn btn-sm ${filter===f?'btn-accent':'btn-ghost'}`} onClick={()=>setFilter(f)} style={{textTransform:'uppercase',fontSize:10,letterSpacing:'0.04em'}}>{f}</button>)}
      </div>
      {(user.role==='officer'||user.role==='admin')&&<button className="btn btn-accent btn-sm" style={{marginLeft:'auto'}} onClick={onAddNew}>➕ New Inspection</button>}
    </div>

    <div className="table-container">
      <div className="table-header">
        <div className="table-title">Vehicle Records <span style={{color:'var(--text3)',fontWeight:400,fontSize:11,fontFamily:'DM Mono,monospace'}}>({filtered.length})</span></div>
      </div>
      <table>
        <thead><tr><th>Reg No.</th><th>Vehicle</th><th>Year</th><th>Odo (km)</th><th>Branch</th><th>Evaluator</th><th>Est. Price</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          {filtered.length===0&&<tr><td colSpan={9}><div style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>No vehicles found</div></td></tr>}
          {filtered.map(v=><tr key={v.id}>
            <td><span style={{fontFamily:'monospace',color:'var(--accent)',fontSize:12,fontWeight:600}}>{v.reg}</span></td>
            <td><b>{v.brand} {v.model}</b><br/><span style={{color:'var(--text3)',fontSize:10}}>{v.variant}</span></td>
            <td style={{color:'var(--text2)'}}>{v.year}</td>
            <td style={{fontFamily:'monospace',fontSize:12}}>{v.odometer?.toLocaleString('en-IN')}</td>
            <td><span style={{fontSize:11,color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{v.branch}</span></td>
            <td style={{color:'var(--text2)',fontSize:11}}>{v.officer}</td>
            <td style={{fontFamily:'monospace',fontWeight:700,color:v.status==='approved'?'var(--green)':'var(--text)'}}>{fmtL(v.price)}</td>
            <td><StatusBadge status={v.status}/></td>
            <td>
              <div style={{display:'flex',gap:5}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setSelectedVehicle(v);setPage('detail');}}>View</button>
                {(user.role==='officer'||user.role==='admin')&&v.price>0&&<button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>generateCustomerPDF(v)} title="Share with customer">📱</button>}
                {user.role==='admin'&&<button className="btn btn-danger btn-sm" onClick={()=>onDelete(v.id)}>Del</button>}
              </div>
            </td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}
