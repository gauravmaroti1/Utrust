//  NEW INSPECTION FORM
// ═══════════════════════════════════════════════════════
function NewInspection({user,onSubmit,onCancel,showToast}){
  const [step,setStep]=useState(0);
  const [manualBrand,setManualBrand]=useState('');
  const [manualModel,setManualModel]=useState('');
  const [manualVariant,setManualVariant]=useState('');
  const [manualYear,setManualYear]=useState('');
  const [manualTransmission,setManualTransmission]=useState('');
  const [data,setData]=useState({
    brand:'',model:'',variant:'',year:'',fuel:'',transmission:'',reg:'',ownership:'1st',
    odometer:'',insurance_expired:false,insurance_valid_od:'',insurance_valid_tp:'',idv:'',purchase_value:'',claim_history:'None',
    engine:'',tyres:'',battery:'',electricals:'',accidental:'No',flood:'No',rating:7,
    price:'',remarks:'',
    photos:{front:null,rear:null,left:null,right:null,interior1:null,interior2:null,engine:null,chassis:null,odometer_photo:null},
    docs:{rc:null,insurance:null,pollution:null,extra:null},
  });

  const set=(k,v)=>setData(p=>({...p,[k]:v}));
  const setPhoto=(k,v)=>setData(p=>({...p,photos:{...p.photos,[k]:v}}));
  const setDoc=(k,v)=>setData(p=>({...p,docs:{...p.docs,[k]:v}}));

  const steps=['Basic Info','Odometer','Photos','Documents','Insurance','Assessment','Pricing','Submit'];
  const brands=Object.keys(CAR_BRANDS);
  const models=data.brand&&data.brand!=='Other'?CAR_BRANDS[data.brand]||[]:[];
  const variants=data.model&&VARIANTS[data.model]?VARIANTS[data.model]:VARIANTS['default'];
  const years=[2026,2025,...Array.from({length:22},(_,i)=>2024-i),'-- Enter Manually --'];

  const algo=estimatePrice(data.idv,data.year,data.accidental,data.claim_history,data.odometer,data.engine,data.fuel,data.insurance_expired,data.purchase_value);

  function handleSubmit(isDraft=false){
    const finalBrand=data.brand==='Other'?manualBrand:data.brand;
    const finalModel=data.model==='-- Type Manually --'?manualModel:data.model;
    const finalVariant=data.variant==='-- Type Manually --'?manualVariant:data.variant;
    const finalYear=data.year==='-- Enter Manually --'?manualYear:data.year;
    const finalTransmission=data.transmission==='-- Enter Manually --'?manualTransmission:data.transmission;
    if(!isDraft&&(!finalBrand||!finalModel||!data.reg)){showToast('Please fill all required fields','error');return;}
    // Strip binary doc data — store only filenames (keep photos for compression/upload)
    const docsForStore={};
    Object.entries(data.docs).forEach(([k,v])=>{ docsForStore[k]=v?{name:v.name,type:v.type}:null; });
    const vehicle={
      id:'V'+Date.now(),
      ...data,
      brand:finalBrand,model:finalModel,variant:finalVariant,
      year:finalYear,transmission:finalTransmission,
      odometer:parseInt(data.odometer)||0,
      price:parseInt(data.price)||0,
      idv:parseInt(data.idv)||0,
      officer:user.name,
      officerId:user.id,
      branch:user.branch,
      docs:docsForStore,
      status:isDraft?'draft':'pending',
      submitted:new Date().toISOString().slice(0,10),
    };
    onSubmit(vehicle);
  }

  const photosNeeded=['front','rear','left','right','interior1','interior2','engine','chassis'];
  const photoCaptured=photosNeeded.filter(k=>data.photos[k]).length;

  const stepContent=[
    // 0: Basic Info
    <div className="form-card">
      <div className="form-card-title">🚗 Vehicle Basic Details</div>
      <div className="form-card-sub">Registration, brand, model — all marked * are mandatory</div>
      <div className="form-grid">
        <div className="field span2">
          <label>Registration Number *</label>
          <input value={data.reg} onChange={e=>set('reg',e.target.value.toUpperCase())} placeholder="e.g. BR04AB1234" style={{fontFamily:'monospace',letterSpacing:'0.1em',fontSize:16}}/>
        </div>
        <div className="field">
          <label>Brand *</label>
          <select value={data.brand} onChange={e=>{set('brand',e.target.value);set('model','');set('variant','');}}>
            <option value="">Select Brand</option>
            {brands.map(b=><option key={b}>{b}</option>)}
          </select>
          {data.brand==='Other'&&<input value={manualBrand} onChange={e=>setManualBrand(e.target.value)} placeholder="Type brand name..." style={{marginTop:6,width:'100%',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>}
        </div>
        <div className="field">
          <label>Model *</label>
          {data.brand&&data.brand!=='Other'
            ?<div>
              <select value={data.model} onChange={e=>{set('model',e.target.value);set('variant','');}}>
                <option value="">Select Model</option>
                {models.map(m=><option key={m}>{m}</option>)}
                <option value="-- Type Manually --">-- Type Manually --</option>
              </select>
              {data.model==='-- Type Manually --'&&<input value={manualModel} onChange={e=>setManualModel(e.target.value)} placeholder="Type model name..." style={{marginTop:6,width:'100%',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>}
            </div>
            :<input value={manualModel} onChange={e=>setManualModel(e.target.value)} placeholder="Type model name..." style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>
          }
        </div>
        <div className="field">
          <label>Variant</label>
          {data.model&&data.model!=='-- Type Manually --'&&data.brand!=='Other'
            ?<div>
              <select value={data.variant} onChange={e=>set('variant',e.target.value)}>
                <option value="">Select Variant</option>
                {variants.map(v=><option key={v}>{v}</option>)}
              </select>
              {data.variant==='-- Type Manually --'&&<input value={manualVariant} onChange={e=>setManualVariant(e.target.value)} placeholder="Type variant..." style={{marginTop:6,width:'100%',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>}
            </div>
            :<input value={manualVariant} onChange={e=>setManualVariant(e.target.value)} placeholder="Type variant manually..." style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>
          }
        </div>
        <div className="field">
          <label>Year of Manufacture *</label>
          <select value={data.year} onChange={e=>set('year',e.target.value)}>
            <option value="">Select Year</option>
            {years.map(y=><option key={y}>{y}</option>)}
          </select>
          {data.year==='-- Enter Manually --'&&<input value={manualYear} onChange={e=>setManualYear(e.target.value)} placeholder="Type year e.g. 2023" style={{marginTop:6,width:'100%',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontFamily:'DM Mono,monospace',fontSize:16,outline:'none',letterSpacing:'0.08em'}}/>}
        </div>
        <div className="field">
          <label>Fuel Type *</label>
          <select value={data.fuel} onChange={e=>set('fuel',e.target.value)}>
            <option value="">Select</option>
            {['Petrol','Diesel','CNG','Electric','Hybrid','LPG'].map(f=><option key={f}>{f}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Transmission *</label>
          <select value={data.transmission} onChange={e=>set('transmission',e.target.value)}>
            <option value="">Select</option>
            {['Manual','Automatic','CVT','AMT','DCT','iMT','-- Enter Manually --'].map(t=><option key={t}>{t}</option>)}
          </select>
          {data.transmission==='-- Enter Manually --'&&<input value={manualTransmission} onChange={e=>setManualTransmission(e.target.value)} placeholder="Type transmission type..." style={{marginTop:6,width:'100%',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--text)',fontFamily:'Instrument Sans,sans-serif',outline:'none'}}/>}
        </div>
        <div className="field">
          <label>Ownership</label>
          <select value={data.ownership} onChange={e=>set('ownership',e.target.value)}>
            {['1st','2nd','3rd','4th+'].map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
      </div>
    </div>,

    // 1: Odometer
    <div className="form-card">
      <div className="form-card-title">📍 Odometer Reading</div>
      <div className="form-card-sub">Enter reading and capture odometer photo — timestamp auto-embedded</div>
      <div className="field" style={{marginBottom:20}}>
        <label>Odometer Reading (km) *</label>
        <input type="number" value={data.odometer} onChange={e=>set('odometer',e.target.value)} placeholder="e.g. 42000" style={{fontFamily:'monospace',fontSize:22,padding:'14px'}}/>
        {data.odometer&&<div style={{marginTop:6,fontSize:12,color:'var(--text3)'}}>Approx. {Math.round(data.odometer/Math.max(new Date().getFullYear()-(parseInt(data.year)||2020),1)).toLocaleString('en-IN')} km/year avg</div>}
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'0.08em',textTransform:'uppercase'}}>Odometer Photo (Mandatory — timestamp auto-applied)</div>
      <CameraCapture label="Odometer Reading Photo" onCapture={v=>setPhoto('odometer_photo',v)} captured={data.photos.odometer_photo}/>
    </div>,

    // 2: Photos
    <div className="form-card">
      <div className="form-card-title">📷 Vehicle Inspection Photos</div>
      <div className="form-card-sub">Capture all angles using device camera — {photoCaptured}/8 photos done (2 interior required)</div>
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:18,fontSize:12,color:'var(--text2)',display:'flex',alignItems:'center',gap:8}}>
        <span>📱</span> Uses your device camera. Timestamp is auto-embedded on every photo.
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Exterior Photos</div>
      <div className="camera-grid" style={{marginBottom:18}}>
        {[['front','Front View *'],['rear','Rear View *'],['left','Left Side *'],['right','Right Side *']].map(([k,l])=>
          <CameraCapture key={k} label={l} onCapture={v=>setPhoto(k,v)} captured={data.photos[k]}/>
        )}
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Interior Photos (Minimum 2 required)</div>
      <div className="camera-grid" style={{marginBottom:18}}>
        <CameraCapture label="Interior — Dashboard & Front *" onCapture={v=>setPhoto('interior1',v)} captured={data.photos.interior1}/>
        <CameraCapture label="Interior — Rear Seats & Boot *" onCapture={v=>setPhoto('interior2',v)} captured={data.photos.interior2}/>
      </div>
      <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Under Hood & Chassis</div>
      <div className="camera-grid">
        <CameraCapture label="Engine Bay *" onCapture={v=>setPhoto('engine',v)} captured={data.photos.engine}/>
        <CameraCapture label="Chassis / VIN Number *" onCapture={v=>setPhoto('chassis',v)} captured={data.photos.chassis}/>
      </div>
      <div style={{marginTop:18}}>
        <div className="field"><label>Inspection Remarks</label>
          <textarea rows={3} value={data.remarks} onChange={e=>set('remarks',e.target.value)} placeholder="Note scratches, dents, damages, body condition..." style={{resize:'vertical'}}/>
        </div>
      </div>
    </div>,

    // 3: Documents
    <div className="form-card">
      <div className="form-card-title">📋 Document Upload</div>
      <div className="form-card-sub">Upload or capture required documents. RC and Insurance are mandatory.</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
        {[['rc','📄','RC Certificate *'],['insurance','🛡','Insurance Doc *'],['pollution','🌿','PUC Certificate']].map(([k,icon,label])=>{
          const val=data.docs[k];
          return<div key={k}>
            <input type="file" id={`doc-${k}`} accept="image/*,application/pdf" style={{display:'none'}}
              onChange={e=>{
                const file=e.target.files[0];
                if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>setDoc(k,{name:file.name,data:ev.target.result,type:file.type});
                reader.readAsDataURL(file);
              }}/>
            <div className={`upload-zone ${val?'uploaded':''}`}
              onClick={()=>document.getElementById(`doc-${k}`).click()}>
              <span className="upload-icon">{val?'✅':icon}</span>
              <div className="upload-label">{val?'Uploaded ✓':'Tap to Upload'}</div>
              <div className="upload-sub" style={{wordBreak:'break-all'}}>{val?val.name:label}</div>
            </div>
            {val&&<button className="btn btn-danger btn-sm" style={{marginTop:4,width:'100%'}}
              onClick={e=>{e.stopPropagation();setDoc(k,null);document.getElementById(`doc-${k}`).value='';}}>
              Remove
            </button>}
          </div>;
        })}
      </div>
      <div style={{marginTop:14}}>
        <input type="file" id="doc-extra" accept="image/*,application/pdf" style={{display:'none'}}
          onChange={e=>{
            const file=e.target.files[0];
            if(!file)return;
            const reader=new FileReader();
            reader.onload=ev=>setDoc('extra',{name:file.name,data:ev.target.result,type:file.type});
            reader.readAsDataURL(file);
          }}/>
        <div className={`upload-zone ${data.docs.extra?'uploaded':''}`}
          onClick={()=>document.getElementById('doc-extra').click()}>
          <span className="upload-icon">{data.docs.extra?'✅':'📎'}</span>
          <div className="upload-label">{data.docs.extra?data.docs.extra.name:'Additional Document'}</div>
          <div className="upload-sub">Service history, warranty, NOC etc.</div>
        </div>
      </div>
    </div>,

    // 4: Insurance
    <div className="form-card">
      <div className="form-card-title">🛡 Insurance & IDV Details</div>
      <div className="form-card-sub">Enter insurance status — IDV or purchase value drives the price algorithm</div>

      {/* Insurance Expired Toggle */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:data.insurance_expired?'var(--red-dim)':'var(--surface2)',border:`1px solid ${data.insurance_expired?'rgba(239,68,68,0.3)':'var(--border)'}`,borderRadius:'var(--radius)',marginBottom:16}}>
        <div>
          <div style={{fontSize:13,fontWeight:600}}>Insurance Expired / Not Available</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Switch ON if insurance is expired or unavailable — will use purchase value instead</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className={`check-btn ${!data.insurance_expired?'good':''}`} onClick={()=>set('insurance_expired',false)}>Active</button>
          <button className={`check-btn ${data.insurance_expired?'bad':''}`} onClick={()=>set('insurance_expired',true)}>Expired</button>
        </div>
      </div>

      {!data.insurance_expired && <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:16,fontSize:12,color:'var(--text2)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'0.08em',textTransform:'uppercase'}}>Insurance Validity</div>
        <div className="form-grid">
          <div className="field" style={{marginBottom:0}}>
            <label>OD (Own Damage) Valid Until</label>
            <input type="date" value={data.insurance_valid_od} onChange={e=>set('insurance_valid_od',e.target.value)}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Covers damage to your own vehicle</div>
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>Third Party (TP) Valid Until</label>
            <input type="date" value={data.insurance_valid_tp} onChange={e=>set('insurance_valid_tp',e.target.value)}/>
            <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Mandatory by law — covers third party</div>
          </div>
        </div>
        {data.insurance_valid_od&&data.insurance_valid_tp&&<div style={{marginTop:10,padding:'8px 10px',background:'var(--surface3)',borderRadius:'var(--radius)',fontSize:11,color:'var(--text3)'}}>
          {new Date(data.insurance_valid_od)<new Date(data.insurance_valid_tp)
            ?`⚠ OD expires before TP — OD valid until ${data.insurance_valid_od}`
            :`✓ Both policies active — TP valid until ${data.insurance_valid_tp}`}
        </div>}
      </div>}

      {data.insurance_expired && <div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:16,fontSize:12,color:'var(--red)'}}>
        ⚠ No valid IDV available. The algorithm will use the car's original purchase value with increased depreciation (10% extra penalty + higher age depreciation rates).
      </div>}

      <div className="form-grid">
        {!data.insurance_expired && <div className="field"><label>IDV — Insured Declared Value (₹) {!data.insurance_expired&&'*'}</label>
          <input type="number" value={data.idv} onChange={e=>set('idv',e.target.value)} placeholder="e.g. 750000"/>
        </div>}
        {data.insurance_expired && <div className="field span2"><label>Original Car Purchase Value (₹) * <span style={{color:'var(--accent)',fontSize:10}}>Used instead of IDV</span></label>
          <input type="number" value={data.purchase_value} onChange={e=>set('purchase_value',e.target.value)} placeholder="e.g. 900000 — original price when car was bought" style={{fontFamily:'monospace',fontSize:16}}/>
          {data.purchase_value&&<div style={{marginTop:5,fontSize:11,color:'var(--text3)'}}>Algorithm will apply {data.year?new Date().getFullYear()-parseInt(data.year):0}-year depreciation + 10% no-insurance penalty</div>}
        </div>}
        {!data.insurance_expired && <div className="field"><label>Claim History</label>
          <select value={data.claim_history} onChange={e=>set('claim_history',e.target.value)}>
            {['None','1 Minor','1 Major','2+ Claims','Unknown'].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>}
        {data.insurance_expired && <div className="field"><label>Claim History (if known)</label>
          <select value={data.claim_history} onChange={e=>set('claim_history',e.target.value)}>
            {['Unknown','None','1 Minor','1 Major','2+ Claims'].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>}
      </div>
    </div>,

    // 5: Assessment
    <div className="form-card">
      <div className="form-card-title">🔍 Condition Assessment</div>
      <div className="form-card-sub">Rate every component — affects price estimation algorithm</div>
      <div className="checklist" style={{marginBottom:20}}>
        {[
          {label:'Engine Condition',field:'engine',opts:['Excellent','Good','Fair','Poor']},
          {label:'Tyres Condition',field:'tyres',opts:['Excellent','Good','Fair','Worn']},
          {label:'Battery Status',field:'battery',opts:['Excellent','Good','Weak','Dead']},
          {label:'Electricals',field:'electricals',opts:['Excellent','Good','Issues','Dead']},
        ].map(c=><div key={c.field} className="check-item">
          <span className="check-label">{c.label}</span>
          <div className="check-controls">
            {c.opts.map(o=><button key={o} className={`check-btn ${data[c.field]===o?(o==='Excellent'||o==='Good'?'good':o==='Fair'||o==='Weak'?'warn':'bad'):''}`} onClick={()=>set(c.field,o)}>{o}</button>)}
          </div>
        </div>)}
        {[{label:'Accidental History',field:'accidental'},{label:'Flood Damage',field:'flood'}].map(c=><div key={c.field} className="check-item">
          <span className="check-label">{c.label}</span>
          <div className="check-controls">
            <button className={`check-btn ${data[c.field]==='Yes'?'bad':''}`} onClick={()=>set(c.field,'Yes')}>Yes</button>
            <button className={`check-btn ${data[c.field]==='No'?'good':''}`} onClick={()=>set(c.field,'No')}>No</button>
            <button className={`check-btn ${data[c.field]==='Unknown'?'warn':''}`} onClick={()=>set(c.field,'Unknown')}>Unknown</button>
          </div>
        </div>)}
      </div>
      <div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Overall Vehicle Rating (1–10)</div>
        <div className="rating">
          {Array.from({length:10},(_,i)=>i+1).map(n=><button key={n} className={`rating-btn ${data.rating===n?'selected':''}`} onClick={()=>set('rating',n)}>{n}</button>)}
        </div>
      </div>
    </div>,

    // 6: Pricing (officer = estimate only, cannot finalize)
    <div className="form-card">
      <div className="form-card-title">💰 Price Estimation</div>
      <div className="form-card-sub">Enter your estimated purchase price — Team Leader will approve/revise</div>

      {algo&&<div className="algo-box">
        <div className="algo-title">🧮 Algorithm Suggested Price</div>
        <div className="algo-sub">Based on IDV, vehicle age, condition, claim history & fuel type</div>
        <div className="algo-breakdown">
          {algo.steps.map((s,i)=><div key={i} className="algo-row">
            <span className="algo-key">{s.label}</span>
            <span className={`algo-val ${s.type==='result'?'result':s.type==='deduct'?'minus':''}`}>
              {s.type==='base'?fmt(s.val):s.type==='result'?fmtL(s.val):`${s.val>=0?'+':''}${fmt(s.val)}`}
            </span>
          </div>)}
        </div>
        <div className="algo-suggest">
          💡 Suggested Purchase Price: <b style={{color:'var(--accent)',fontFamily:'DM Mono,monospace'}}>{fmtL(algo.price)}</b>
          &nbsp;— You may quote within ±10% of this. Final approval by Utrust Incharge.
        </div>
      </div>}

      {!algo&&<div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:16,marginBottom:16,color:'var(--text3)',fontSize:12}}>
        ⚠ Fill IDV, Year, and Assessment fields to see algorithm-suggested price
      </div>}

      <div className="field">
        <label>Your Estimated Purchase Price (₹) *</label>
        <input type="number" value={data.price} onChange={e=>set('price',e.target.value)} placeholder={algo?`Suggested: ${algo.price}`:'e.g. 750000'} style={{fontFamily:'monospace',fontSize:20,padding:'14px'}}/>
        {data.price&&<div style={{marginTop:6,display:'flex',gap:16,fontSize:12}}>
          <span style={{color:'var(--green)'}}>= {fmtL(data.price)}</span>
          {algo&&<span style={{color:Math.abs(data.price-algo.price)/algo.price>0.15?'var(--red)':'var(--text3)'}}>
            {Math.abs(data.price-algo.price)/algo.price>0.15?'⚠ Significantly differs from algorithm':'✓ Within acceptable range'}
          </span>}
        </div>}
      </div>
      <div style={{background:'var(--accent-dim)',border:'1px solid rgba(245,166,35,0.2)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--accent)',marginTop:4}}>
        🔒 This is your <b>estimated</b> price only. The Utrust Incharge will review and set the final approved purchase price.
      </div>
    </div>,

    // 7: Submit
    <div className="form-card">
      <div className="form-card-title">✅ Review & Submit</div>
      <div className="form-card-sub">Verify details before sending for Incharge approval</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
        {[
          ['Registration',data.reg||'—'],
          ['Vehicle',`${data.brand==='Other'?manualBrand:data.brand} ${data.model==='-- Type Manually --'?manualModel:data.model}`.trim()||'—'],
          ['Variant',data.variant==='-- Type Manually --'?manualVariant:(data.variant||'—')],
          ['Year',data.year==='-- Enter Manually --'?manualYear:(data.year||'—')],
          ['Fuel',data.fuel||'—'],
          ['Transmission',data.transmission==='-- Enter Manually --'?manualTransmission:(data.transmission||'—')],
          ['Odometer',data.odometer?`${parseInt(data.odometer).toLocaleString('en-IN')} km`:'—'],
          ['OD Insurance',data.insurance_valid_od||'—'],
          ['TP Insurance',data.insurance_valid_tp||'—'],
          ['IDV',fmtL(data.idv)],['Estimated Price',fmtL(data.price)],
          ['Engine',data.engine||'—'],['Accidental',data.accidental||'—'],
          ['Photos',`${photoCaptured}/8 captured`],
          ['RC Doc',data.docs.rc?'✓ '+data.docs.rc.name:'Not uploaded'],
          ['Insurance Doc',data.docs.insurance?'✓ '+data.docs.insurance.name:'Not uploaded'],
        ].map(([k,v])=><div key={k} style={{padding:'9px 12px',background:'var(--surface2)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
          <div style={{fontSize:9,color:'var(--text3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.07em',textTransform:'uppercase'}}>{k}</div>
          <div style={{fontSize:12,fontWeight:600,marginTop:2,wordBreak:'break-word',color:(k==='Photos'&&photoCaptured<8)||(k==='RC Doc'&&!data.docs.rc)||(k==='Insurance Doc'&&!data.docs.insurance)?'var(--red)':v.startsWith('✓')?'var(--green)':'var(--text)'}}>{v}</div>
        </div>)}
      </div>
      {photoCaptured<8&&<div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--red)',marginBottom:10}}>
        ⚠ Only {photoCaptured}/8 photos captured. All photos are mandatory before submission. (2 interior photos required)
      </div>}
      {(!data.docs.rc||!data.docs.insurance)&&<div style={{background:'var(--red-dim)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:'var(--radius)',padding:'10px 14px',fontSize:12,color:'var(--red)',marginBottom:10}}>
        ⚠ RC and Insurance documents are mandatory. Please upload them in Step 4.
      </div>}
      <div style={{background:'var(--accent-dim)',border:'1px solid rgba(245,166,35,0.25)',borderRadius:'var(--radius)',padding:12,fontSize:12,color:'var(--accent)'}}>
        🚀 Submitting will send this inspection to <b>Utrust Incharge</b> for review and price approval.
      </div>
    </div>,
  ];

  return<div className="form-container">
    <div className="step-progress">
      {steps.map((s,i)=><div key={i} className={`step ${i===step?'active':i<step?'done':''}`} onClick={()=>i<step&&setStep(i)}>
        <span className="step-num">{i<step?'✓':i+1}</span>{s}
      </div>)}
    </div>
    {stepContent[step]}
    <div style={{display:'flex',gap:10,justifyContent:'space-between',marginTop:8}}>
      <button className="btn btn-ghost" onClick={step===0?onCancel:()=>setStep(s=>s-1)}>{step===0?'Cancel':'← Back'}</button>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-ghost" onClick={()=>handleSubmit(true)}>💾 Save Draft</button>
        {step<steps.length-1
          ?<button className="btn btn-accent" onClick={()=>setStep(s=>s+1)}>Next →</button>
          :<button className="btn btn-accent" onClick={()=>handleSubmit(false)}>🚀 Submit for Approval</button>
        }
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════
//  VEHICLE DETAIL
// ═══════════════════════════════════════════════════════
function VehicleDetail({vehicle,user,onBack,onApprove,onReject,onGeneratePDF,onUpdatePrice}){
  const [comment,setComment]=useState('');
  const [approvedPrice,setApprovedPrice]=useState('');
  const [modal,setModal]=useState(null);
  if(!vehicle)return<div style={{textAlign:'center',padding:60,color:'var(--text3)'}}>No vehicle selected</div>;

  const algo=estimatePrice(vehicle.idv,vehicle.year,vehicle.accidental,vehicle.claim_history,vehicle.odometer,vehicle.engine,vehicle.fuel,vehicle.insurance_expired,vehicle.purchase_value);
  const photoKeys=['front','rear','left','right','interior1','interior2','engine','chassis'];
  const photoLabels={front:'FRONT',rear:'REAR',left:'LEFT',right:'RIGHT',interior1:'INTERIOR 1',interior2:'INTERIOR 2',engine:'ENGINE',chassis:'CHASSIS'};
  // Normalise — Firestore may store as photoUrls, local state uses photos
  const photoMap=vehicle.photos||vehicle.photoUrls||{};

  return<div>
    <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:22,flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
      <div style={{flex:1}}>
        <div style={{fontFamily:'DM Mono,monospace',color:'var(--accent)',fontSize:12,fontWeight:600}}>{vehicle.reg} · {vehicle.branch}</div>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:19,fontWeight:800}}>{vehicle.brand} {vehicle.model} {vehicle.variant}</div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <StatusBadge status={vehicle.status}/>
        {(user.role==='leader'||user.role==='admin')&&vehicle.status==='pending'&&<>
          <button className="btn btn-success btn-sm" onClick={()=>setModal('approve')}>✓ Approve</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setModal('reject')}>✗ Reject</button>
        </>}
        <button className="btn btn-ghost btn-sm" onClick={()=>generateCustomerPDF(vehicle)}>📱 Customer PDF</button>
        <button className="btn btn-accent btn-sm" onClick={()=>onGeneratePDF(vehicle)}>📄 Full PDF</button>
      </div>
    </div>

    <div className="detail-sections">
      <div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🚗 Vehicle Details</div>
          {[['Registration',vehicle.reg],['Brand',vehicle.brand],['Model',vehicle.model],['Variant',vehicle.variant],['Year',vehicle.year],['Fuel',vehicle.fuel],['Transmission',vehicle.transmission],['Odometer',vehicle.odometer?`${vehicle.odometer.toLocaleString('en-IN')} km`:'—'],['Ownership',vehicle.ownership],['Branch',vehicle.branch],['Evaluator',vehicle.officer]].map(([k,v])=>
            <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v||'—'}</span></div>
          )}
        </div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🛡 Insurance & IDV</div>
          {[['IDV',fmtL(vehicle.idv)],['OD Valid Until',vehicle.insurance_valid_od||vehicle.insurance_valid||'—'],['TP Valid Until',vehicle.insurance_valid_tp||'—'],['Claim History',vehicle.claim_history]].map(([k,v])=>
            <div key={k} className="detail-row"><span className="detail-key">{k}</span><span className="detail-val">{v||'—'}</span></div>
          )}
        </div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">📋 Documents</div>
          {[['RC Certificate',vehicle.docs?.rc],['Insurance Doc',vehicle.docs?.insurance],['PUC Certificate',vehicle.docs?.pollution],['Additional',vehicle.docs?.extra]].map(([label,doc])=>
            <div key={label} className="detail-row">
              <span className="detail-key">{label}</span>
              <span className="detail-val" style={{color:doc?'var(--green)':'var(--text3)',fontSize:11}}>{doc?'✓ '+doc.name:'Not uploaded'}</span>
            </div>
          )}
        </div>
        <div className="detail-card">
          <div className="detail-card-title">💰 Price Details</div>
          <div style={{padding:'12px 0',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:4}}>EVALUATOR ESTIMATE</div>
            <div style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:800,color:'var(--accent)'}}>{fmtL(vehicle.price)}</div>
            {algo&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Algorithm suggests: <b style={{color:'var(--text2)'}}>{fmtL(algo.price)}</b></div>}
            {vehicle.approved_price&&<>
              <div style={{height:1,background:'var(--border)',margin:'12px 0'}}/>
              <div style={{fontSize:10,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:4}}>INCHARGE APPROVED PRICE</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:800,color:'var(--green)'}}>{fmtL(vehicle.approved_price)}</div>
            </>}
          </div>
          {(user.role==='leader'||user.role==='admin')&&vehicle.status==='approved'&&<div style={{marginTop:8}}>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:5,fontFamily:'DM Mono,monospace',letterSpacing:'0.06em',textTransform:'uppercase'}}>Update Approved Price</div>
            <div style={{display:'flex',gap:6}}>
              <input type="number" placeholder="Final price..." style={{flex:1,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'7px 12px',color:'var(--text)',fontFamily:'monospace',fontSize:13,outline:'none'}} onChange={e=>setApprovedPrice(e.target.value)}/>
              <button className="btn btn-success btn-sm" onClick={()=>{onUpdatePrice(vehicle.id,parseInt(approvedPrice));}}>Set</button>
            </div>
          </div>}
        </div>
      </div>

      <div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">📷 Photos <span style={{fontSize:10,color:'var(--text3)',fontWeight:400}}>(tap to enlarge)</span></div>
          <div className="photo-grid">
            {photoKeys.map(k=>{
              const src=photoMap[k];
              return<div key={k}>
                <div className="photo-thumb" style={{cursor:src?'pointer':'default'}}
                  onClick={()=>{if(src){const w=window.open('','_blank');w.document.write(`<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${src}" style="max-width:100%;max-height:100vh;object-fit:contain"/><p style="position:fixed;bottom:10px;left:10px;color:#f5a623;font-family:monospace;font-size:12px">${photoLabels[k]} — ${vehicle.reg}</p></body></html>`);w.document.close();}}}>
                  {src?<img src={src} alt={k} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:18,opacity:0.35}}>📷</span>}
                </div>
                <div className="photo-label" style={{color:src?'var(--green)':'var(--text3)'}}>{photoLabels[k]||k.toUpperCase()}{src?' ✓':''}</div>
              </div>;
            })}
          </div>
        </div>
        <div className="detail-card" style={{marginBottom:14}}>
          <div className="detail-card-title">🔍 Condition</div>
          {[['Engine',vehicle.engine],['Tyres',vehicle.tyres],['Battery',vehicle.battery],['Electricals',vehicle.electricals],['Accidental',vehicle.accidental],['Flood',vehicle.flood],['Rating',`${vehicle.rating}/10`]].map(([k,v])=>{
            const bad=v==='Worn'||v==='Dead'||v==='Issues'||v==='Yes'||v==='Poor';
            const good=v==='Excellent'||v==='Good'||v==='No';
            return<div key={k} className="detail-row">
              <span className="detail-key">{k}</span>
              <span className="detail-val" style={{color:bad?'var(--red)':good?'var(--green)':'var(--accent)'}}>{v||'—'}</span>
            </div>;
          })}
        </div>
        {algo&&<div className="detail-card">
          <div className="detail-card-title">🧮 Price Algorithm Breakdown</div>
          {algo.steps.map((s,i)=><div key={i} className="detail-row">
            <span className="detail-key" style={{fontSize:10}}>{s.label}</span>
            <span className="detail-val" style={{fontSize:11,color:s.type==='result'?'var(--accent)':s.type==='deduct'?'var(--red)':s.type==='bonus'?'var(--green)':'var(--text)'}}>{s.type==='base'?fmt(s.val):s.type==='result'?fmtL(s.val):`${s.val>=0?'+':''}${fmt(s.val)}`}</span>
          </div>)}
        </div>}
      </div>
    </div>

    {modal&&<Modal title={modal==='approve'?'Approve & Set Price':'Reject Vehicle'} sub={`${vehicle.brand} ${vehicle.model} — ${vehicle.reg}`} onClose={()=>setModal(null)}>
      {modal==='approve'&&<>
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:12,marginBottom:14,fontSize:12}}>
          <div style={{color:'var(--text3)',marginBottom:4}}>Evaluator estimate: <b style={{color:'var(--accent)'}}>{fmtL(vehicle.price)}</b></div>
          {algo&&<div style={{color:'var(--text3)'}}>Algorithm suggests: <b style={{color:'var(--text2)'}}>{fmtL(algo.price)}</b></div>}
        </div>
        <div className="field"><label>Final Approved Purchase Price (₹) *</label>
          <input type="number" value={approvedPrice} onChange={e=>setApprovedPrice(e.target.value)} placeholder={`Evaluator quoted: ${vehicle.price}`} style={{fontFamily:'monospace',fontSize:18}}/>
        </div>
      </>}
      <div className="field"><label>{modal==='approve'?'Approval Notes':'Rejection Reason'}</label>
        <textarea rows={3} value={comment} onChange={e=>setComment(e.target.value)} placeholder={modal==='approve'?'Optional notes...':'State reason for rejection...'} style={{resize:'vertical'}}/>
      </div>
      <div className="modal-actions">
        <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
        <button className={`btn ${modal==='approve'?'btn-success':'btn-danger'}`} onClick={()=>{
          modal==='approve'?onApprove(vehicle.id,comment,parseInt(approvedPrice)||vehicle.price):onReject(vehicle.id,comment);
          setModal(null);setComment('');setApprovedPrice('');
        }}>{modal==='approve'?'✓ Approve':'✗ Reject'}</button>
      </div>
    </Modal>}
  </div>;
}

// ═══════════════════════════════════════════════════════
//  APPROVALS
// ═══════════════════════════════════════════════════════
function Approvals({vehicles,user,onApprove,onReject,setPage,setSelectedVehicle}){
  const pending=vehicles.filter(v=>v.status==='pending'||v.status==='review');
  const [comment,setComment]=useState('');
  const [price,setPrice]=useState('');
  const [active,setActive]=useState(null);
  const [action,setAction]=useState(null);
  const algo=active?estimatePrice(active.idv,active.year,active.accidental,active.claim_history,active.odometer,active.engine,active.fuel,active.insurance_expired,active.purchase_value):null;

  return<div>

      <div>No pending approvals</div>

    {pending.map(v=>{
      const a=estimatePrice(v.idv,v.year,v.accidental,v.claim_history,v.odometer,v.engine,v.fuel,v.insurance_expired,v.purchase_value);
      return<div key={v.id} className="approval-card">
        <div className="approval-thumb">{v.fuel==='Electric'?'⚡':'🚗'}</div>
        <div className="approval-meta">
          <div className="approval-reg">{v.reg} · {v.branch}</div>
          <div className="approval-car">{v.brand} {v.model} {v.variant} <span style={{color:'var(--text3)',fontWeight:400,fontSize:13}}>{v.year}</span></div>
          <div className="approval-tags">
            {[v.fuel,v.transmission,`${v.odometer?.toLocaleString('en-IN')} km`,v.ownership+' Owner',`★ ${v.rating}/10`].map(t=><span key={t} className="tag">{t}</span>)}
            {v.accidental==='Yes'&&<span className="tag" style={{color:'var(--red)',borderColor:'rgba(239,68,68,0.3)',background:'var(--red-dim)'}}>⚠ Accidental</span>}
          </div>
          <div style={{display:'flex',gap:16,alignItems:'baseline'}}>
            <div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:2}}>EVALUATOR QUOTE</div>

            {a&&<div><div style={{fontSize:9,color:'var(--text3)',fontFamily:'DM Mono,monospace',marginBottom:2}}>ALGO SUGGESTS</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,color:'var(--accent)'}}>{fmtL(a.price)}</div></div>}
          </div>
          <div className="approval-officer">Submitted by {v.officer} on {v.submitted}</div>
        </div>
        <div className="approval-actions">
          <button className="btn btn-ghost btn-sm" onClick={()=>{setSelectedVehicle(v);setPage('detail');}}>👁 Details</button>
          <button className="btn btn-success btn-sm" onClick={()=>{setActive(v);setAction('approve');}}>✓ Approve</button>
          <button className="btn btn-danger btn-sm" onClick={()=>{setActive(v);setAction('reject');}}>✗ Reject</button>
        </div>
      </div>;
    })}

    {active&&<Modal title={action==='approve'?'Approve & Set Final Price':'Reject Inspection'} sub={`${active.brand} ${active.model} — ${active.reg}`} onClose={()=>setActive(null)}>
      {action==='approve'&&<>
        <div className="algo-box" style={{marginBottom:14}}>
          <div className="algo-title" style={{fontSize:13,marginBottom:8}}>Price Summary</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <div style={{padding:'10px',background:'var(--surface2)',borderRadius:'var(--radius)',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',marginBottom:4,fontFamily:'DM Mono,monospace',letterSpacing:'0.06em'}}>EVALUATOR QUOTE</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:800,color:'var(--accent)'}}>{fmtL(active.price)}</div>
            </div>
            <div style={{padding:'10px',background:'var(--surface2)',borderRadius:'var(--radius)',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',marginBottom:4,fontFamily:'DM Mono,monospace',letterSpacing:'0.06em'}}>ALGO SUGGESTED</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:800,color:'var(--text2)'}}>{algo?fmtL(algo.price):'—'}</div>
            </div>
          </div>
        </div>
        <div className="field"><label>Set Final Approved Purchase Price (₹) *</label>
          <input type="number" value={price} onChange={e=>setPrice(e.target.value)} placeholder={`e.g. ${active.price}`} style={{fontFamily:'monospace',fontSize:18}}/>
          {price&&<div style={{fontSize:11,color:'var(--green)',marginTop:4}}>= {fmtL(price)}</div>}
        </div>
      </>}
      <div className="field"><label>Comments</label>
        <textarea rows={2} value={comment} onChange={e=>setComment(e.target.value)} placeholder={action==='approve'?'Add notes...':'Reason for rejection...'} style={{resize:'vertical'}}/>
      </div>
      <div className="modal-actions">
        <button className="btn btn-ghost" onClick={()=>setActive(null)}>Cancel</button>
        <button className={`btn ${action==='approve'?'btn-success':'btn-danger'}`} onClick={()=>{
          action==='approve'?onApprove(active.id,comment,parseInt(price)||active.price):onReject(active.id,comment);
          setActive(null);setComment('');setPrice('');
        }}>{action==='approve'?'✓ Confirm & Approve':'✗ Reject'}</button>
      </div>
    </Modal>}
  </div>;
}

// ═══════════════════════════════════════════════════════
//  EMPLOYEE DATABASE (Admin only)
// ═══════════════════════════════════════════════════════
function EmployeeDB({vehicles,showToast}){
  const [users,setUsers]=useState(()=>[...CRED_LIST]);
  const [modal,setModal]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showPwd,setShowPwd]=useState({});
  const [search,setSearch]=useState('');
  const [branchFilter,setBranchFilter]=useState('all');
  const [form,setForm]=useState({name:'',username:'',password:'Utrust@2025',role:'officer',branch:'Purnea',email:'',phone:''});
  const roleColors={admin:'var(--purple)',leader:'var(--blue)',officer:'var(--green)'};
  const roleLabels={admin:'ADMIN',leader:'INCHARGE / TEAM LEADER',officer:'SALES OFFICER / EVALUATOR'};
  const BRANCHES=['Purnea','Bhagalpur','Forbesganj','Kishanganj','Katihar','Banka','Khagaria','Saharsa','Supaul','HQ','All Branches'];

  function persistUsers(newList){
    try{localStorage.setItem('utrust_credentials',JSON.stringify(newList));}catch(e){}
    CRED_LIST.length=0;
    newList.forEach(u=>CRED_LIST.push(u));
    setUsers([...newList]);
  }

  function openAdd(){
    setForm({name:'',username:'',password:'Utrust@2025',role:'officer',branch:'Purnea',email:'',phone:''});
    setEditing(null);setModal('form');
  }
  function openEdit(u){setForm({...u});setEditing(u.id);setModal('form');}

  function saveUser(){
    if(!form.name.trim()||!form.username.trim()||!form.password.trim()){
      showToast('Name, username and password are required','error');return;
    }
    const dup=users.find(u=>u.username===form.username.trim()&&u.id!==editing);
    if(dup){showToast(`Username "${form.username}" already exists — choose another`,'error');return;}
    const cleanForm={...form,username:form.username.trim().toLowerCase(),name:form.name.trim(),
      avatar:form.name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()};
    let newList;
    if(editing){
      newList=users.map(u=>u.id===editing?{...u,...cleanForm}:u);
      showToast(`${cleanForm.name} updated — new password active immediately`,'success');
    }else{
      newList=[...users,{...cleanForm,id:'U'+Date.now()}];
      showToast(`${cleanForm.name} added — login: ${cleanForm.username} / ${cleanForm.password}`,'success');
    }
    persistUsers(newList);setModal(null);
  }

  function deleteUser(id){
    if(id==='U001'){showToast('Cannot delete the main admin account','error');return;}
    const u=users.find(x=>x.id===id);
    if(!confirm(`Remove ${u?.name}? This cannot be undone.`))return;
    persistUsers(users.filter(x=>x.id!==id));
    showToast(`${u?.name} removed`,'info');
  }

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const filteredUsers=users.filter(u=>{
    const q=search.toLowerCase();
    const ms=!q||u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.phone||'').includes(q);
    const mb=branchFilter==='all'||u.branch===branchFilter;
    return ms&&mb;
  });

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div style={{color:'var(--text3)',fontSize:13}}>{users.length} employees · {new Set(users.map(u=>u.branch)).size} branches</div>
      <button className="btn btn-accent btn-sm" onClick={openAdd}>➕ Add Employee</button>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
      <div className="search-bar" style={{flex:1,minWidth:180}}>
        <span>🔍</span>
        <input placeholder="Search name, username, phone..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:'100%'}}/>
      </div>
      <select style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'7px 12px',color:'var(--text)',fontSize:13,outline:'none'}} value={branchFilter} onChange={e=>setBranchFilter(e.target.value)}>
        <option value="all">All Branches</option>
        {BRANCHES.map(b=><option key={b}>{b}</option>)}
      </select>
    </div>

    {['admin','leader','officer'].map(role=>{
      const roleUsers=filteredUsers.filter(u=>u.role===role);
      if(!roleUsers.length)return null;
      const rc=role==='admin'?'168,85,247':role==='leader'?'59,130,246':'34,197,94';
      return<div key={role} style={{marginBottom:24}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--border)'}}>{roleLabels[role]} ({roleUsers.length})</div>
        {roleUsers.map(u=>{
          const uv=vehicles.filter(v=>v.officerId===u.id);
          return<div key={u.id} className="user-card" style={{flexWrap:'wrap',gap:10}}>
            <div className={`avatar ${u.role}`} style={{width:38,height:38,fontSize:13,flexShrink:0}}>{u.avatar}</div>
            <div className="user-info" style={{flex:'1 1 160px',minWidth:0}}>
              <div className="user-name">{u.name}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:3}}>
                <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--accent)'}}>{u.username}</span>
                {u.phone&&<span style={{fontSize:11,color:'var(--text3)'}}>📞 {u.phone}</span>}
                {u.branch&&<span className="user-branch-tag">📍 {u.branch}</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4}}>
                <span style={{fontSize:10,color:'var(--text3)'}}>pwd:</span>
                <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:showPwd[u.id]?'var(--text)':'var(--border2)',letterSpacing:showPwd[u.id]?'normal':'0.15em'}}>
                  {showPwd[u.id]?u.password:'●●●●●●●●'}
                </span>
                <button style={{background:'none',border:'none',cursor:'pointer',fontSize:13,padding:'0 3px',lineHeight:1}} onClick={()=>setShowPwd(p=>({...p,[u.id]:!p[u.id]}))}>
                  {showPwd[u.id]?'🙈':'👁'}
                </button>
              </div>
            </div>
            <span className="badge" style={{background:`rgba(${rc},0.15)`,color:`rgb(${rc})`,border:`1px solid rgba(${rc},0.3)`,fontSize:10,flexShrink:0,alignSelf:'flex-start'}}>{role==='admin'?'ADMIN':role==='leader'?'INCHARGE':'OFFICER'}</span>
            {u.role==='officer'&&<div className="user-stats" style={{flexShrink:0}}>
              {[['Inspected',uv.length],['Approved',uv.filter(v=>v.status==='approved').length]].map(([l,v])=>
                <div key={l} className="user-stat"><div className="user-stat-val">{v}</div><div className="user-stat-label">{l}</div></div>
              )}
            </div>}
            <div style={{display:'flex',gap:6,flexShrink:0}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(u)}>✏️ Edit</button>
              {u.id!=='U001'&&<button className="btn btn-danger btn-sm" onClick={()=>deleteUser(u.id)}>🗑</button>}
            </div>
          </div>;
        })}
      </div>;
    })}

    {modal==='form'&&<Modal title={editing?'Edit Employee':'Add New Employee'} sub="Changes take effect immediately — password works on next login" onClose={()=>setModal(null)}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="field" style={{gridColumn:'span 2'}}><label>Full Name *</label>
          <input value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="Employee full name"/></div>
        <div className="field"><label>Username * <span style={{color:'var(--text3)',fontSize:10,fontWeight:400}}>(for login)</span></label>
          <input value={form.username} onChange={e=>setF('username',e.target.value)} placeholder="e.g. ravi.purnea"/>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>No spaces. Use format: name.branch</div></div>
        <div className="field"><label>Password *</label>
          <input value={form.password} onChange={e=>setF('password',e.target.value)} placeholder="Min 6 chars"/>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>Default: Utrust@2025</div></div>
        <div className="field"><label>Role</label>
          <select value={form.role} onChange={e=>setF('role',e.target.value)}>
            <option value="officer">Sales Officer / Evaluator</option>
            <option value="leader">Incharge / Team Leader</option>
            <option value="admin">Admin (full access)</option>
          </select></div>
        <div className="field"><label>Branch</label>
          <select value={form.branch} onChange={e=>setF('branch',e.target.value)}>
            {BRANCHES.map(b=><option key={b}>{b}</option>)}
          </select></div>
        <div className="field"><label>Phone Number</label>
          <input value={form.phone} onChange={e=>setF('phone',e.target.value)} placeholder="10-digit mobile"/></div>
        <div className="field"><label>Email (optional)</label>
          <input value={form.email} onChange={e=>setF('email',e.target.value)} placeholder="name@utrust.in"/></div>
      </div>
      <div className="modal-actions">
        <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn btn-accent" onClick={saveUser}>{editing?'💾 Save Changes':'➕ Add Employee'}</button>
      </div>
    </Modal>}
  </div>;
}

//  ANALYTICS
// ═══════════════════════════════════════════════════════
function Analytics({vehicles}){
  const total=vehicles.length;
  const approved=vehicles.filter(v=>v.status==='approved');
  const avgPrice=vehicles.filter(v=>v.price).reduce((a,b)=>a+b.price,0)/(vehicles.filter(v=>v.price).length||1);
  const brandCounts={};vehicles.forEach(v=>{if(v.brand)brandCounts[v.brand]=(brandCounts[v.brand]||0)+1;});
  const topBrands=Object.entries(brandCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxB=Math.max(...topBrands.map(b=>b[1]),1);

  return<div>
    <div className="stats-grid" style={{marginBottom:20}}>
      {[{l:'Total',v:total,i:'🚗'},{l:'Approved',v:approved.length,i:'✅'},{l:'Avg Estimate',v:fmtL(avgPrice),i:'💰'},{l:'Rejection Rate',v:`${total?Math.round(vehicles.filter(v=>v.status==='rejected').length/total*100):0}%`,i:'📉'}].map((s,i)=><div key={i} className="stat-card"><div className="stat-label">{s.l}</div><div className="stat-value">{s.v}</div><div className="stat-icon">{s.i}</div></div>)}
    </div>
    <div className="analytics-grid">
      <div className="chart-card">
        <div className="chart-title">Top Brands</div>
        <div className="bar-chart">{topBrands.map(([b,c])=><div key={b} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{b.split(' ')[0]}</div><div className="bar-track"><div className="bar-fill" style={{width:`${c/maxB*100}%`}}/></div><div className="bar-val">{c}</div></div>)}</div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Branch Breakdown</div>
        <div className="bar-chart">{['Purnea','Bhagalpur','Forbesganj'].map(b=>{const c=vehicles.filter(v=>v.branch===b).length;return<div key={b} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{b}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:'var(--blue)'}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Fuel Distribution</div>
        <div className="bar-chart">{['Petrol','Diesel','CNG','Electric','Hybrid'].map(f=>{const c=vehicles.filter(v=>v.fuel===f).length;const cols={Petrol:'var(--accent)',Diesel:'var(--blue)',Electric:'var(--green)',CNG:'var(--purple)',Hybrid:'#22d3ee'};return<div key={f} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{f}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:cols[f]}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
      <div className="chart-card">
        <div className="chart-title">Price Range</div>
        <div className="bar-chart">{[['<3L',0,300000],['3–6L',300000,600000],['6–10L',600000,1000000],['10–20L',1000000,2000000],['>20L',2000000,Infinity]].map(([l,mn,mx])=>{const c=vehicles.filter(v=>v.price>=mn&&v.price<mx).length;return<div key={l} className="bar-row"><div className="bar-label" style={{fontSize:10}}>{l}</div><div className="bar-track"><div className="bar-fill" style={{width:`${total?c/total*100:0}%`,background:'var(--purple)'}}/></div><div className="bar-val">{c}</div></div>;})}
        </div>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════
//  CUSTOMER PDF — clean report for sharing via WhatsApp
//  No algorithm breakdown — just photos, condition, est. price
// ═══════════════════════════════════════════════════════
function generateCustomerPDF(vehicle){
  const win=window.open('','_blank');
  const photoKeys=['front','rear','left','right','interior1','interior2','engine','chassis'];
  const pLabels={front:'Front View',rear:'Rear View',left:'Left Side',right:'Right Side',interior1:'Interior — Dashboard',interior2:'Interior — Rear & Boot',engine:'Engine Bay',chassis:'Chassis / VIN'};
  const pm=vehicle.photos||vehicle.photoUrls||{};
  const capturedPhotos=photoKeys.filter(k=>pm[k]);

  const photosHTML=capturedPhotos.map(k=>`
    <div style="break-inside:avoid">
      <div style="border-radius:8px;overflow:hidden;border:1px solid #e8e8e8;aspect-ratio:4/3;background:#f5f5f5">
        <img src="${pm[k]}" style="width:100%;height:100%;object-fit:cover" crossorigin="anonymous"/>
      </div>
      <div style="font-size:10px;text-align:center;margin-top:4px;color:#888;font-family:monospace">${pLabels[k]}</div>
    </div>`).join('');

// ═══════════════════════════════════════════════════════
//  APP ROOT — Firebase connected
// ═══════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [vehicles,setVehicles]=useState(INITIAL_VEHICLES);
  const [selectedVehicle,setSelectedVehicle]=useState(null);
  const [toast,setToast]=useState(null);
  const [fbReady,setFbReady]=useState(!!window.FB_READY);
  const [dbLive,setDbLive]=useState(false);
  const [saving,setSaving]=useState(false);

  const showToast=(msg,type='success')=>setToast({msg,type});

  // Wait for Firebase module to finish loading
  useEffect(()=>{
    if(window.FB_READY){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener('fb-ready',h);
    return()=>window.removeEventListener('fb-ready',h);
  },[]);

  // Subscribe to Firestore as soon as Firebase is ready — NOT gated on user login
  // This ensures incharge/admin see new submissions from evaluators in real time
  useEffect(()=>{
    if(!fbReady)return;
    let unsub;
    try{
      unsub=window.FB.fbListenVehicles(docs=>{
        setDbLive(true);
        if(docs.length>0){
          setVehicles(docs);
        } else {
          // First ever run — seed with sample data
          window.FB.fbSeedIfEmpty(INITIAL_VEHICLES).catch(()=>{});
        }
      });
    }catch(e){
      console.warn('Firestore unavailable — using local state',e);
    }
    return()=>{if(unsub)unsub();};
  },[fbReady]); // <-- removed `user` dependency so listener starts immediately

  const pendingCount=vehicles.filter(v=>v.status==='pending'||v.status==='review').length;

  async function handleApprove(id,comment,approvedPrice){
    const updates={status:'approved',approved:new Date().toISOString().slice(0,10),approved_price:approvedPrice,approval_comment:comment};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Vehicle approved & price set!','success');
  }

  async function handleReject(id,comment){
    const updates={status:'rejected',rejection_comment:comment};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Vehicle inspection rejected.','error');
  }

  async function handleUpdatePrice(id,price){
    const updates={approved_price:price};
    setVehicles(vs=>vs.map(v=>v.id===id?{...v,...updates}:v));
    if(selectedVehicle?.id===id)setSelectedVehicle(v=>({...v,...updates}));
    if(fbReady&&window.FB){try{await window.FB.fbUpdateVehicle(id,updates);}catch(e){console.warn(e);}}
    showToast('Approved price updated!','success');
  }

  async function handleNewVehicle(vehicle){
    setSaving(true);
    showToast('Compressing photos & saving to cloud...','info');
    // Optimistic update
    setVehicles(vs=>[vehicle,...vs]);
    setPage('vehicles');
    if(fbReady&&window.FB){
      try{
        await window.FB.fbSaveVehicle(vehicle);
        showToast(vehicle.status==='draft'?'Draft saved to cloud!':'Submitted for Incharge approval!',vehicle.status==='draft'?'info':'success');
      }catch(e){
        console.warn('Firebase save failed, keeping local',e);
        showToast('Saved locally (check internet connection)','info');
      }
    } else {
      showToast(vehicle.status==='draft'?'Draft saved!':'Submitted for approval!',vehicle.status==='draft'?'info':'success');
    }
    setSaving(false);
  }

  async function handleDelete(id){
    setVehicles(vs=>vs.filter(v=>v.id!==id));
    if(fbReady&&window.FB){try{await window.FB.fbDeleteVehicle(id);}catch(e){console.warn(e);}}
    showToast('Vehicle record deleted.','info');
  }

  const titles={dashboard:'Dashboard',vehicles:user?.role==='officer'?'My Inspections':'All Vehicles',add:'New Inspection',approval:'Pending Approvals',reports:'Analytics',users:'Employee Database',detail:'Vehicle Detail',hosting:'Hosting Guide'};

  if(!user)return<Login onLogin={u=>{setUser(u);setPage('dashboard');}}/>;

  const renderPage=()=>{
    if(page==='dashboard')return<Dashboard vehicles={vehicles} user={user} setPage={setPage}/>;
    if(page==='vehicles')return<VehiclesList vehicles={vehicles} user={user} setPage={setPage} setSelectedVehicle={setSelectedVehicle} onAddNew={()=>setPage('add')} onDelete={handleDelete}/>;
    if(page==='add')return<NewInspection user={user} onSubmit={handleNewVehicle} onCancel={()=>setPage('vehicles')} showToast={showToast}/>;
    if(page==='approval')return<Approvals vehicles={vehicles} user={user} onApprove={handleApprove} onReject={handleReject} setPage={setPage} setSelectedVehicle={setSelectedVehicle}/>;
    if(page==='reports')return<Analytics vehicles={vehicles}/>;
    if(page==='users')return<EmployeeDB vehicles={vehicles} showToast={showToast}/>;
    if(page==='hosting')return<HostingGuide/>;
    if(page==='detail')return<VehicleDetail vehicle={selectedVehicle} user={user} onBack={()=>setPage('vehicles')} onApprove={handleApprove} onReject={handleReject} onGeneratePDF={generatePDF} onUpdatePrice={handleUpdatePrice}/>;
    return<Dashboard vehicles={vehicles} user={user} setPage={setPage}/>;
  };

  return<>
    <Sidebar user={user} page={page} setPage={setPage} onLogout={()=>{setUser(null);setPage('dashboard');}} pendingCount={pendingCount}/>
    <div className="main">
      <div className="topbar">
        <div>
          <div className="topbar-title">{titles[page]||'Utrust'}</div>
          <div className="topbar-sub">Utrust Vehicle Management · {user.branch}</div>
        </div>
        <div className="topbar-actions">
          {/* Cloud sync indicator */}
          <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,fontFamily:'DM Mono,monospace',padding:'3px 8px',borderRadius:4,background:dbLive?'var(--green-dim)':'var(--surface2)',border:`1px solid ${dbLive?'rgba(34,197,94,0.3)':'var(--border)'}`,color:dbLive?'var(--green)':'var(--text3)'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:dbLive?'var(--green)':'var(--text3)',display:'inline-block',animation:dbLive?'pulse 2s infinite':'none'}}/>
            {saving?'Saving...':dbLive?'Cloud Live':'Local'}
          </div>
          <div style={{fontSize:11,color:'var(--text3)',fontFamily:'DM Mono,monospace'}}>{new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
          {page!=='add'&&(user.role==='officer'||user.role==='admin')&&<button className="btn btn-accent btn-sm" onClick={()=>setPage('add')}>➕ New</button>}
        </div>
      </div>
      <div className="content">{renderPage()}</div>
    </div>
    {toast&&<Toast message={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
